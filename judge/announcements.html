<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin Announcements - Judge Panel</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen">
  
  <div id="global-page-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
    <div class="flex flex-col items-center space-y-3">
      <div class="h-10 w-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div>
      <p class="text-xs font-bold text-slate-700 font-display">Loading broadcasts...</p>
    </div>
  </div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- Sidebar -->
    <div id="portal-sidebar"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 main-content-layout">
      <!-- Header -->
      <div id="portal-header"></div>

      <main class="flex-1 p-4 lg:p-8 space-y-8">
        
        <!-- Header Controls -->
        <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs flex items-center justify-between">
          <div class="space-y-1">
            <h1 id="title-main" class="text-2xl font-extrabold text-slate-900 tracking-tight font-display">Admin Announcements</h1>
            <p id="desc-main" class="text-xs text-slate-400 font-medium font-display">Real-time alerts, operational schedules, and updates from the festival committee.</p>
          </div>
          <div class="flex items-center space-x-2">
            <button id="lang-btn-en" class="px-2.5 py-1 text-[10px] font-bold border rounded-lg hover:bg-slate-50 cursor-pointer">EN</button>
            <button id="lang-btn-ml" class="px-2.5 py-1 text-[10px] font-bold border rounded-lg hover:bg-slate-50 cursor-pointer">മലയാളം</button>
          </div>
        </div>

        <!-- Announcements Feed -->
        <div id="announcements-feed" class="space-y-4">
          <!-- Loaded dynamically -->
        </div>

      </main>
    </div>
  </div>

  <script type="module">
    import { verifyUserRole } from "/assets/js/role-guard.js";
    import { loadPortalLayout } from "/assets/js/component-loader.js";
    import { initializeNavigation } from "/assets/js/navigation.js";
    import { getAnnouncementsForRole } from "/assets/js/notification-service.js";
    import { en } from "/assets/js/translations-en.js";
    import { ml } from "/assets/js/translations-ml.js";

    let judgeProfile = null;
    let currentLanguage = localStorage.getItem('meeladpulse_lang') || 'en';

    function getTrans(key) {
      const dict = currentLanguage === 'ml' ? ml : en;
      return dict[key] || key;
    }

    async function initPage() {
      try {
        judgeProfile = await verifyUserRole(['judge']);
        await loadPortalLayout('judge');
        initializeNavigation();
        setupLanguageControls();
        applyTranslations();

        await loadAnnouncements();
        document.getElementById('global-page-loader').classList.add('hidden');
      } catch (err) {
        console.error("Announcements failed:", err);
        document.getElementById('global-page-loader').classList.add('hidden');
      }
    }

    function setupLanguageControls() {
      const btnEn = document.getElementById('lang-btn-en');
      const btnMl = document.getElementById('lang-btn-ml');
      
      const updateButtons = () => {
        if (currentLanguage === 'ml') {
          btnMl.className = "px-2.5 py-1 text-[10px] font-bold border border-emerald-500 bg-emerald-50 text-emerald-700 rounded-lg cursor-pointer";
          btnEn.className = "px-2.5 py-1 text-[10px] font-bold border rounded-lg hover:bg-slate-50 cursor-pointer text-slate-500";
        } else {
          btnEn.className = "px-2.5 py-1 text-[10px] font-bold border border-emerald-500 bg-emerald-50 text-emerald-700 rounded-lg cursor-pointer";
          btnMl.className = "px-2.5 py-1 text-[10px] font-bold border rounded-lg hover:bg-slate-50 cursor-pointer text-slate-500";
        }
      };

      btnEn.onclick = () => {
        currentLanguage = 'en';
        localStorage.setItem('meeladpulse_lang', 'en');
        updateButtons();
        applyTranslations();
        loadAnnouncements();
      };

      btnMl.onclick = () => {
        currentLanguage = 'ml';
        localStorage.setItem('meeladpulse_lang', 'ml');
        updateButtons();
        applyTranslations();
        loadAnnouncements();
      };

      updateButtons();
    }

    function applyTranslations() {
      document.getElementById('title-main').textContent = getTrans('adminAnnouncements');
    }

    async function loadAnnouncements() {
      const feed = document.getElementById('announcements-feed');
      feed.innerHTML = '<div class="py-12 text-center text-slate-400">Loading broadcasts...</div>';

      try {
        const list = await getAnnouncementsForRole('judge');

        feed.innerHTML = '';
        if (list.length === 0) {
          feed.innerHTML = `
            <div class="bg-white rounded-2xl border border-slate-100 p-8 text-center text-slate-400">
              <p class="font-bold text-slate-700">${getTrans('noAnnouncements')}</p>
            </div>
          `;
          return;
        }

        list.forEach(a => {
          const card = document.createElement('div');
          card.className = "bg-white border border-slate-100 p-6 rounded-2xl shadow-xs space-y-3";
          
          const d = a.createdAt?.seconds ? new Date(a.createdAt.seconds * 1000) : new Date();
          const timeStr = `${d.toLocaleDateString()} at ${d.toLocaleTimeString([], {hour: '2-digit', minute:'2-digit'})}`;

          card.innerHTML = `
            <div class="flex items-center justify-between">
              <h3 class="text-sm font-extrabold text-slate-900 font-display">${a.title}</h3>
              <span class="text-[10px] font-mono text-slate-400 font-medium">${timeStr}</span>
            </div>
            <p class="text-xs text-slate-600 leading-relaxed font-medium">${a.content}</p>
            <div class="pt-2 flex items-center space-x-1">
              <span class="h-1.5 w-1.5 rounded-full bg-emerald-500"></span>
              <span class="text-[9px] font-bold text-slate-400 uppercase tracking-wider">Posted by ${a.createdByName || 'Admin'}</span>
            </div>
          `;
          feed.appendChild(card);
        });

      } catch (err) {
        console.error("Announcements load error:", err);
        feed.innerHTML = '<div class="py-12 text-center text-rose-600 font-bold">Failed to load alerts.</div>';
      }
    }

    initPage();
  </script>
</body>
</html>
