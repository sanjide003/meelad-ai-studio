<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Authorised Station Profile - Judge Panel</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen">
  
  <div id="global-page-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
    <div class="flex flex-col items-center space-y-3">
      <div class="h-10 w-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div>
      <p class="text-xs font-bold text-slate-700 font-display">Verifying authorization profile...</p>
    </div>
  </div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- Sidebar -->
    <div id="portal-sidebar"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 main-content-layout">
      <!-- Header -->
      <div id="portal-header"></div>

      <main class="flex-1 p-4 lg:p-8 space-y-8">
        
        <!-- Header Controls -->
        <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs flex items-center justify-between">
          <div class="space-y-1">
            <h1 id="title-main" class="text-2xl font-extrabold text-slate-900 tracking-tight font-display">Judge Profile</h1>
            <p id="desc-main" class="text-xs text-slate-400 font-medium font-display">Authorised scoring station credentials and statistics.</p>
          </div>
          <div class="flex items-center space-x-2">
            <button id="lang-btn-en" class="px-2.5 py-1 text-[10px] font-bold border rounded-lg hover:bg-slate-50 cursor-pointer">EN</button>
            <button id="lang-btn-ml" class="px-2.5 py-1 text-[10px] font-bold border rounded-lg hover:bg-slate-50 cursor-pointer">മലയാളം</button>
          </div>
        </div>

        <div class="grid grid-cols-1 md:grid-cols-3 gap-6">
          
          <!-- Column 1: Credentials card -->
          <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs space-y-6 flex flex-col items-center text-center">
            <div class="h-16 w-16 rounded-full bg-emerald-500 text-slate-950 font-extrabold text-2xl flex items-center justify-center font-display shadow-inner">
              J
            </div>
            <div class="space-y-1">
              <h2 id="prof-name" class="text-lg font-bold text-slate-900 font-display">...</h2>
              <p id="prof-email" class="text-xs text-slate-400 font-mono">...</p>
            </div>
            <div class="inline-flex px-3 py-1 rounded-full text-[10px] font-bold bg-emerald-50 text-emerald-700 font-mono border border-emerald-100 uppercase tracking-widest">
              Authorised Judge
            </div>
          </div>

          <!-- Column 2: Stats cards -->
          <div class="md:col-span-2 space-y-6">
            <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs space-y-6">
              <h3 class="text-xs font-bold text-slate-400 uppercase tracking-widest">Station Statistics</h3>
              
              <div class="grid grid-cols-1 sm:grid-cols-3 gap-4 text-xs">
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-1">
                  <span class="text-[10px] text-slate-400 font-bold uppercase block">Total Assignments</span>
                  <p id="stat-total" class="text-2xl font-extrabold text-slate-900 font-mono">0</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-1">
                  <span class="text-[10px] text-slate-400 font-bold uppercase block">Finalized Sheets</span>
                  <p id="stat-finalized" class="text-2xl font-extrabold text-slate-900 font-mono">0</p>
                </div>
                <div class="bg-slate-50 p-4 rounded-xl border border-slate-100 space-y-1">
                  <span class="text-[10px] text-slate-400 font-bold uppercase block">Active Drafts</span>
                  <p id="stat-drafts" class="text-2xl font-extrabold text-slate-900 font-mono">0</p>
                </div>
              </div>
            </div>
          </div>

        </div>

      </main>
    </div>
  </div>

  <script type="module">
    import { verifyUserRole } from "/assets/js/role-guard.js";
    import { loadPortalLayout } from "/assets/js/component-loader.js";
    import { initializeNavigation } from "/assets/js/navigation.js";
    import { getAssignmentsForJudge } from "/assets/js/judge-service.js";
    import { getJudgeMarksForCompetitionAndJudge } from "/assets/js/mark-service.js";
    import { en } from "/assets/js/translations-en.js";
    import { ml } from "/assets/js/translations-ml.js";

    let judgeProfile = null;
    let currentLanguage = localStorage.getItem('meeladpulse_lang') || 'en';

    function getTrans(key) {
      const dict = currentLanguage === 'ml' ? ml : en;
      return dict[key] || key;
    }

    async function initPage() {
      try {
        judgeProfile = await verifyUserRole(['judge']);
        await loadPortalLayout('judge');
        initializeNavigation();
        setupLanguageControls();
        applyTranslations();

        await loadProfileDetails();
        document.getElementById('global-page-loader').classList.add('hidden');
      } catch (err) {
        console.error("Profile view failed:", err);
        document.getElementById('global-page-loader').classList.add('hidden');
      }
    }

    function setupLanguageControls() {
      const btnEn = document.getElementById('lang-btn-en');
      const btnMl = document.getElementById('lang-btn-ml');
      
      const updateButtons = () => {
        if (currentLanguage === 'ml') {
          btnMl.className = "px-2.5 py-1 text-[10px] font-bold border border-emerald-500 bg-emerald-50 text-emerald-700 rounded-lg cursor-pointer";
          btnEn.className = "px-2.5 py-1 text-[10px] font-bold border rounded-lg hover:bg-slate-50 cursor-pointer text-slate-500";
        } else {
          btnEn.className = "px-2.5 py-1 text-[10px] font-bold border border-emerald-500 bg-emerald-50 text-emerald-700 rounded-lg cursor-pointer";
          btnMl.className = "px-2.5 py-1 text-[10px] font-bold border rounded-lg hover:bg-slate-50 cursor-pointer text-slate-500";
        }
      };

      btnEn.onclick = () => {
        currentLanguage = 'en';
        localStorage.setItem('meeladpulse_lang', 'en');
        updateButtons();
        applyTranslations();
      };

      btnMl.onclick = () => {
        currentLanguage = 'ml';
        localStorage.setItem('meeladpulse_lang', 'ml');
        updateButtons();
        applyTranslations();
      };

      updateButtons();
    }

    function applyTranslations() {
      document.getElementById('title-main').textContent = currentLanguage === 'ml' ? 'ജഡ്ജ് പ്രൊഫൈൽ' : 'Judge Profile';
    }

    async function loadProfileDetails() {
      document.getElementById('prof-name').textContent = judgeProfile.displayName || 'Authorized Judge';
      document.getElementById('prof-email').textContent = judgeProfile.email || 'judge@meeladpulse.com';

      try {
        const assigns = await getAssignmentsForJudge(judgeProfile.uid);
        let finalizedCount = 0;
        let draftsCount = 0;

        for (const a of assigns) {
          const marks = await getJudgeMarksForCompetitionAndJudge(a.competitionId, judgeProfile.uid);
          finalizedCount += marks.filter(m => m.submissionStatus === 'final').length;
          draftsCount += marks.filter(m => m.submissionStatus !== 'final').length;
        }

        document.getElementById('stat-total').textContent = assigns.length;
        document.getElementById('stat-finalized').textContent = finalizedCount;
        document.getElementById('stat-drafts').textContent = draftsCount;

      } catch (e) {
        console.error("Failed loading stats:", e);
      }
    }

    initPage();
  </script>
</body>
</html>
