<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Reset Password - MeeladPulse</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4 login-bg">
  <div class="max-w-md w-full bg-white rounded-2xl login-card p-8 space-y-6">
    <div class="text-center space-y-2">
      <div class="inline-flex h-12 w-12 items-center justify-center rounded-xl bg-slate-900 text-white font-extrabold text-lg font-display mb-1">
        MP
      </div>
      <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight font-display">Reset Password</h1>
      <p class="text-xs text-slate-400 font-medium">Recover account access keys securely</p>
    </div>

    <!-- Alert Box -->
    <div id="status-box" class="hidden rounded-xl p-4 text-xs flex items-start space-x-2.5">
      <svg id="status-icon" class="h-4 w-4 shrink-0 mt-0.5" fill="none" stroke="currentColor" viewBox="0 0 24 24"></svg>
      <span id="status-text">...</span>
    </div>

    <form id="reset-form" class="space-y-4">
      <div class="space-y-1.5">
        <label for="email" class="text-xs font-bold text-slate-700">Your Registered Email</label>
        <input type="email" id="email" required class="form-input" placeholder="name@domain.com">
      </div>

      <button type="submit" id="submit-btn" class="w-full btn btn-primary py-3 font-bold text-white transition cursor-pointer">
        Send Reset Recovery Email
      </button>

      <div class="text-center">
        <a href="login.html" class="text-xs font-bold text-emerald-600 hover:text-emerald-500 transition">Return to Login Screen</a>
      </div>
    </form>
  </div>

  <script type="module">
    import { resetPassword } from "./assets/js/auth.js";

    const form = document.getElementById('reset-form');
    const statusBox = document.getElementById('status-box');
    const statusText = document.getElementById('status-text');
    const statusIcon = document.getElementById('status-icon');
    const submitBtn = document.getElementById('submit-btn');

    form.addEventListener('submit', async (e) => {
      e.preventDefault();
      
      // Clear status
      statusBox.classList.add('hidden');
      const email = document.getElementById('email').value.trim();

      submitBtn.disabled = true;
      submitBtn.textContent = "Processing recovery...";

      try {
        await resetPassword(email);
        
        statusBox.className = "bg-emerald-50 border border-emerald-100 text-emerald-800 rounded-xl p-4 text-xs flex items-start space-x-2.5";
        statusIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
        statusIcon.className = "h-4 w-4 text-emerald-500 shrink-0 mt-0.5";
        statusText.textContent = "A secure password reset verification link has been sent to your email box. Please verify.";
        statusBox.classList.remove('hidden');
        
        form.reset();
      } catch (err) {
        console.error(err);
        statusBox.className = "bg-rose-50 border border-rose-100 text-rose-800 rounded-xl p-4 text-xs flex items-start space-x-2.5";
        statusIcon.innerHTML = `<path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 8v4m0 4h.01M21 12a9 9 0 11-18 0 9 9 0 0118 0z"/>`;
        statusIcon.className = "h-4 w-4 text-rose-500 shrink-0 mt-0.5";
        statusText.textContent = err.message || "Could not execute recovery. Please make sure the email is valid.";
        statusBox.classList.remove('hidden');
      } finally {
        submitBtn.disabled = false;
        submitBtn.textContent = "Send Reset Recovery Email";
      }
    });
  </script>
</body>
</html>
