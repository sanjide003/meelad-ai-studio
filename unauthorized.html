<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Access Denied - MeeladPulse</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen flex items-center justify-center p-4">
  <div class="max-w-md w-full bg-white rounded-2xl shadow-lg border border-slate-100 p-8 text-center space-y-6">
    <div class="inline-flex h-16 w-16 items-center justify-center rounded-full bg-rose-50 text-rose-500 mb-2">
      <svg class="h-8 w-8" fill="none" stroke="currentColor" viewBox="0 0 24 24">
        <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M12 9v2m0 4h.01m-6.938 4h13.856c1.54 0 2.502-1.667 1.732-3L13.732 4c-.77-1.333-2.694-1.333-3.464 0L3.34 16c-.77 1.333.192 3 1.732 3z"/>
      </svg>
    </div>
    
    <div class="space-y-2">
      <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight font-display">Security Restriction</h1>
      <p id="error-message" class="text-sm text-slate-500 leading-relaxed">
        You do not have permission to view this resource, or your session registration is invalid.
      </p>
    </div>

    <div class="bg-slate-50 rounded-xl p-4 text-xs font-mono text-slate-400 text-left space-y-1">
      <p>Error Reason Code: <span id="error-code" class="font-bold text-slate-600">access_denied</span></p>
      <p>System Status: Active Secure</p>
    </div>

    <div>
      <a href="/login.html" class="w-full inline-flex items-center justify-center bg-slate-900 text-white rounded-xl py-3 text-sm font-bold hover:bg-slate-800 transition shadow-xs cursor-pointer">
        Return to Login Page
      </a>
    </div>
  </div>

  <script>
    // Extract reason from URL query
    const params = new URLSearchParams(window.location.search);
    const reason = params.get('reason');
    const msgEl = document.getElementById('error-message');
    const codeEl = document.getElementById('error-code');

    if (reason) {
      codeEl.textContent = reason;
      if (reason === 'inactive') {
        msgEl.textContent = "Your user profile is currently set to inactive. Please ask your administrator to reactivate your registration.";
      } else if (reason === 'no_profile') {
        msgEl.textContent = "No valid database user profile is associated with this authenticated account. Please ask your administrator to create a profile.";
      } else if (reason === 'access_denied') {
        msgEl.textContent = "Your account is not authorized to access this specific portal category or page resource.";
      } else if (reason === 'insufficient_permissions') {
        msgEl.textContent = "Access denied: Your role does not hold the required system authorization permissions.";
      }
    }
  </script>
</body>
</html>
