<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Categories - Admin Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen">
  <div id="global-page-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
    <div class="flex flex-col items-center space-y-3">
      <div class="h-10 w-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div>
      <p class="text-xs font-bold text-slate-700">Loading Categories...</p>
    </div>
  </div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    <div id="portal-sidebar"></div>
    <div class="flex-1 flex flex-col min-w-0 main-content-layout">
      <div id="portal-header"></div>
      <main class="flex-1 p-4 lg:p-8 space-y-8">
        <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs flex flex-col md:flex-row md:items-center justify-between gap-4">
          <div class="space-y-1">
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight font-display">Category Setup</h1>
            <p class="text-xs text-slate-500 font-medium">Create age/category labels here instead of using fixed default categories.</p>
          </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8 items-start">
          <section class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs space-y-5">
            <h2 class="text-sm font-bold text-slate-800 font-display">Create / Edit Category</h2>
            <form id="category-form" class="space-y-4">
              <input type="hidden" id="category-id">
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700">Category Name</label>
                <input id="category-name" required class="form-input" placeholder="e.g. Junior / Senior / മുബ്തദി">
              </div>
              <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                  <label class="text-xs font-bold text-slate-700">Category Code</label>
                  <input id="category-code" required class="form-input uppercase" placeholder="JUNIOR">
                </div>
                <div class="space-y-1.5">
                  <label class="text-xs font-bold text-slate-700">Colour</label>
                  <input id="category-colour" type="color" class="form-input h-10 p-1" value="#10b981">
                </div>
              </div>
              <label class="flex items-center gap-2 text-xs font-bold text-slate-700">
                <input id="category-active" type="checkbox" checked class="rounded border-slate-300 text-emerald-500"> Active category
              </label>
              <div class="flex gap-2 pt-2">
                <button class="btn btn-primary text-xs font-bold text-white px-4 py-2">Save Category</button>
                <button id="category-cancel" type="button" class="hidden btn btn-secondary text-xs font-bold px-4 py-2">Cancel</button>
              </div>
            </form>
          </section>

          <section class="xl:col-span-2 bg-white rounded-2xl border border-slate-100 shadow-xs overflow-hidden">
            <div class="p-5 border-b border-slate-100 bg-slate-50/60 flex items-center justify-between">
              <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Configured Categories</h2>
              <span id="category-count" class="text-xs font-bold bg-slate-100 text-slate-600 py-1 px-2.5 rounded-full">0</span>
            </div>
            <div class="table-container">
              <table class="w-full text-left border-collapse">
                <thead><tr class="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest"><th class="px-6 py-4">Code</th><th class="px-6 py-4">Name</th><th class="px-6 py-4">Status</th><th class="px-6 py-4 text-right">Actions</th></tr></thead>
                <tbody id="categories-body" class="divide-y divide-slate-100 text-xs"></tbody>
              </table>
            </div>
          </section>
        </div>
      </main>
    </div>
  </div>

  <script type="module">
    import { verifyUserRole } from "../assets/js/role-guard.js";
    import { loadPortalLayout } from "../assets/js/component-loader.js";
    import { initializeNavigation } from "../assets/js/navigation.js";
    import { getCategories, saveCategory, deleteCategory } from "../assets/js/firestore-service.js";

    const form = document.getElementById('category-form');
    const body = document.getElementById('categories-body');
    let categories = [];

    async function initPage() {
      await verifyUserRole(['admin']);
      await loadPortalLayout('admin');
      initializeNavigation();
      await loadCategories();
      form.onsubmit = saveCurrentCategory;
      document.getElementById('category-cancel').onclick = resetForm;
      document.getElementById('global-page-loader').classList.add('hidden');
    }

    async function loadCategories() {
      categories = (await getCategories() || []).sort((a, b) => (a.code || '').localeCompare(b.code || ''));
      document.getElementById('category-count').textContent = categories.length;
      body.innerHTML = categories.length ? '' : '<tr><td colspan="4" class="px-6 py-10 text-center text-slate-400">No categories created yet.</td></tr>';
      categories.forEach(category => {
        const tr = document.createElement('tr');
        tr.className = 'hover:bg-slate-50/70';
        tr.innerHTML = `<td class="px-6 py-4 font-mono font-bold" style="color:${category.colour || '#10b981'}">${category.code || category.id}</td><td class="px-6 py-4 font-bold text-slate-800">${category.name || '-'}</td><td class="px-6 py-4"><span class="px-2 py-0.5 rounded-full text-[10px] font-bold ${category.active !== false ? 'bg-emerald-50 text-emerald-700' : 'bg-slate-100 text-slate-500'}">${category.active !== false ? 'Active' : 'Inactive'}</span></td><td class="px-6 py-4 text-right space-x-2"><button class="edit-category text-emerald-600 font-bold">Edit</button><button class="delete-category text-rose-600 font-bold">Delete</button></td>`;
        tr.querySelector('.edit-category').onclick = () => fillForm(category);
        tr.querySelector('.delete-category').onclick = async () => { if (confirm('Delete this category?')) { await deleteCategory(category.id); await loadCategories(); } };
        body.appendChild(tr);
      });
    }

    async function saveCurrentCategory(e) {
      e.preventDefault();
      await saveCategory({ id: document.getElementById('category-id').value, name: document.getElementById('category-name').value.trim(), code: document.getElementById('category-code').value.trim().toUpperCase(), colour: document.getElementById('category-colour').value, active: document.getElementById('category-active').checked });
      resetForm();
      await loadCategories();
    }

    function fillForm(category) {
      document.getElementById('category-id').value = category.id;
      document.getElementById('category-name').value = category.name || '';
      document.getElementById('category-code').value = category.code || category.id;
      document.getElementById('category-colour').value = category.colour || '#10b981';
      document.getElementById('category-active').checked = category.active !== false;
      document.getElementById('category-cancel').classList.remove('hidden');
    }

    function resetForm() {
      form.reset();
      document.getElementById('category-id').value = '';
      document.getElementById('category-colour').value = '#10b981';
      document.getElementById('category-active').checked = true;
      document.getElementById('category-cancel').classList.add('hidden');
    }

    initPage().catch(err => { console.error(err); alert(err.message); });
  </script>
</body>
</html>
