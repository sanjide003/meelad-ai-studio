<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Divisions Management - MeeladPulse</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen">
  
  <div id="global-page-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
    <div class="flex flex-col items-center space-y-3">
      <div class="h-10 w-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div>
      <p class="text-xs font-bold text-slate-700" id="loader-text">Loading Divisions Workspace...</p>
    </div>
  </div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- Sidebar -->
    <div id="portal-sidebar"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 main-content-layout">
      <!-- Header -->
      <div id="portal-header"></div>

      <main class="flex-1 p-4 lg:p-8 space-y-8">
        
        <!-- Header Banner & Translation Toggle -->
        <div class="bg-white rounded-2xl border border-slate-100 p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-xs">
          <div class="space-y-1">
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight font-display" id="page-title-divs">Divisions Configuration</h1>
            <p class="text-xs text-slate-400 font-medium" id="page-subtitle-divs">Manage core festival divisions (e.g. Arts, Sports) and their scoring properties.</p>
          </div>
          <div class="flex items-center space-x-2">
            <button id="lang-toggle-btn" class="btn btn-secondary text-xs py-2 px-3 flex items-center space-x-1 border border-slate-200 cursor-pointer">
              <span>English / മലയാളം</span>
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8 items-start">
          
          <!-- Add/Edit Form Card -->
          <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs space-y-5 xl:col-span-1">
            <h2 class="text-sm font-bold text-slate-800 font-display" id="form-header-div">Create New Division</h2>
            
            <form id="division-form" class="space-y-4">
              <input type="hidden" id="division-id">
              
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700 block" id="lbl-div-name">Division Name (Malayalam / English)</label>
                <input type="text" id="div-name-input" required class="form-input" placeholder="e.g. Arts (കലാമേള)">
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700 block" id="lbl-div-code">Division Code</label>
                <input type="text" id="div-code-input" required class="form-input" placeholder="e.g. ARTS / SPORTS">
              </div>

              <div class="grid grid-cols-2 gap-4">
                <div class="space-y-1.5">
                  <label class="text-xs font-bold text-slate-700 block" id="lbl-div-icon">Icon Name</label>
                  <input type="text" id="div-icon-input" class="form-input" placeholder="e.g. award, music">
                </div>
                <div class="space-y-1.5">
                  <label class="text-xs font-bold text-slate-700 block" id="lbl-div-color">Hex Colour</label>
                  <input type="color" id="div-color-input" class="form-input h-10 p-1 cursor-pointer" value="#10b981">
                </div>
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700 block" id="lbl-div-desc">Description</label>
                <textarea id="div-desc-input" class="form-input" rows="2" placeholder="Brief description..."></textarea>
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700 block" id="lbl-div-order">Display Sort Order</label>
                <input type="number" id="div-order-input" required class="form-input" value="1">
              </div>

              <div class="space-y-3 pt-2">
                <label class="flex items-center space-x-2.5 cursor-pointer">
                  <input type="checkbox" id="div-ranking-input" checked class="rounded border-slate-300 text-emerald-500 focus:ring-emerald-500 h-4 w-4">
                  <span class="text-xs font-bold text-slate-700" id="lbl-div-rank-enable">Enable Championship Ranking</span>
                </label>

                <label class="flex items-center space-x-2.5 cursor-pointer">
                  <input type="checkbox" id="div-champion-input" checked class="rounded border-slate-300 text-emerald-500 focus:ring-emerald-500 h-4 w-4">
                  <span class="text-xs font-bold text-slate-700" id="lbl-div-champ-enable">Enable Individual Championship</span>
                </label>

                <label class="flex items-center space-x-2.5 cursor-pointer">
                  <input type="checkbox" id="div-active-input" checked class="rounded border-slate-300 text-emerald-500 focus:ring-emerald-500 h-4 w-4">
                  <span class="text-xs font-bold text-slate-700" id="lbl-div-active-enable">Division Active</span>
                </label>
              </div>

              <div class="flex items-center space-x-2 pt-2">
                <button type="submit" id="submit-btn" class="flex-1 btn btn-accent py-2.5 text-xs font-bold text-white cursor-pointer shadow-sm">
                  Save Division
                </button>
                <button type="button" id="cancel-btn" class="hidden btn btn-secondary py-2.5 text-xs font-bold text-slate-700 cursor-pointer">
                  Cancel
                </button>
              </div>
            </form>
          </div>

          <!-- Divisions List Panel -->
          <div class="bg-white rounded-2xl border border-slate-100 shadow-xs xl:col-span-2 overflow-hidden">
            <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
              <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider" id="list-header-div">Configured Divisions</h2>
              <span id="division-count" class="text-xs font-bold bg-slate-100 text-slate-600 py-1 px-2.5 rounded-full">0</span>
            </div>

            <div class="table-container">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50/20">
                    <th class="px-6 py-4" id="th-code">Code</th>
                    <th class="px-6 py-4" id="th-name">Division</th>
                    <th class="px-6 py-4" id="th-order">Sort Order</th>
                    <th class="px-6 py-4" id="th-options">Rules</th>
                    <th class="px-6 py-4" id="th-status">Status</th>
                    <th class="px-6 py-4 text-right" id="th-actions">Actions</th>
                  </tr>
                </thead>
                <tbody id="divisions-table-body" class="divide-y divide-slate-100 text-xs text-slate-700">
                  <tr>
                    <td colspan="6" class="px-6 py-12 text-center text-slate-400" id="txt-loading-table">Loading divisions history...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>

      </main>
    </div>
  </div>

  <script type="module">
    import { verifyUserRole } from "/assets/js/role-guard.js";
    import { loadPortalLayout } from "/assets/js/component-loader.js";
    import { initializeNavigation } from "/assets/js/navigation.js";
    import { getDivisions, saveDivision, deleteDivision } from "/assets/js/firestore-service.js";

    let currentLang = localStorage.getItem('meeladpulse_lang') || 'en';

    const trans = {
      en: {
        title: "Divisions Configuration",
        subtitle: "Manage core festival divisions (e.g. Arts, Sports) and their scoring properties.",
        createHeader: "Create New Division",
        editHeader: "Edit Division",
        nameLabel: "Division Name (Malayalam / English)",
        codeLabel: "Division Code",
        iconLabel: "Icon Name",
        colorLabel: "Hex Colour",
        descLabel: "Description",
        orderLabel: "Display Sort Order",
        rankLabel: "Enable Championship Ranking",
        champLabel: "Enable Individual Championship",
        activeLabel: "Division Active",
        saveBtn: "Save Division",
        cancelBtn: "Cancel",
        listHeader: "Configured Divisions",
        thCode: "Code",
        thName: "Division",
        thOrder: "Sort Order",
        thRules: "Rules",
        thStatus: "Status",
        thActions: "Actions",
        loading: "Loading divisions history...",
        noData: "No divisions configured for this festival.",
        confirmDelete: "Are you sure you want to delete this division? This will orphan any linked competitions.",
        rankShort: "Rank",
        champShort: "Champ",
        active: "Active",
        inactive: "Inactive",
        saving: "Saving...",
        deleting: "Deleting..."
      },
      ml: {
        title: "ഡിവിഷനുകൾ",
        subtitle: "ഫെസ്റ്റിവൽ ഡിവിഷനുകളും (ഉദാഹരണത്തിന്: കലാമേള, കായികമേള) അവയുടെ സ്കോറിംഗ് ക്രമീകരണങ്ങളും കൈകാര്യം ചെയ്യുക.",
        createHeader: "പുതിയ ഡിവിഷൻ സൃഷ്ടിക്കുക",
        editHeader: "ഡിവിഷൻ തിരുത്തുക",
        nameLabel: "ഡിവിഷന്റെ പേര് (മലയാളം / ഇംഗ്ലീഷ്)",
        codeLabel: "ഡിവിഷൻ കോഡ്",
        iconLabel: "ഐക്കൺ പേര്",
        colorLabel: "നിറം (ഹെക്സ് കളർ)",
        descLabel: "വിവരണം",
        orderLabel: "ക്രമം (സോർട്ട് ഓർഡർ)",
        rankLabel: "ചാമ്പ്യൻഷിപ്പ് റാങ്കിംഗ് അനുവദിക്കുക",
        champLabel: "വ്യക്തിഗത ചാമ്പ്യൻഷിപ്പ് അനുവദിക്കുക",
        activeLabel: "ഡിവിഷൻ സജീവം",
        saveBtn: "ഡിവിഷൻ സേവ് ചെയ്യുക",
        cancelBtn: "റദ്ദാക്കുക",
        listHeader: "നിലവിലുള്ള ഡിവിഷനുകൾ",
        thCode: "കോഡ്",
        thName: "ഡിവിഷൻ",
        thOrder: "ക്രമം",
        thRules: "നിയമങ്ങൾ",
        thStatus: "നില",
        thActions: "നടപടികൾ",
        loading: "വിവരങ്ങൾ ശേഖരിക്കുന്നു...",
        noData: "ഈ ഫെസ്റ്റിവലിൽ ഡിവിഷനുകളൊന്നും ക്രമീകരിച്ചിട്ടില്ല.",
        confirmDelete: "ഈ ഡിവിഷൻ ഇല്ലാതാക്കാൻ നിങ്ങൾക്ക് ഉറപ്പാണോ? ഇത് ലിങ്ക് ചെയ്ത മത്സരങ്ങളെ ബാധിച്ചേക്കാം.",
        rankShort: "റാങ്ക്",
        champShort: "ചാമ്പ്യൻ",
        active: "സജീവം",
        inactive: "സജീവമല്ല",
        saving: "സേവ് ചെയ്യുന്നു...",
        deleting: "ഡിലീറ്റ് ചെയ്യുന്നു..."
      }
    };

    function applyTranslations() {
      const t = trans[currentLang];
      document.getElementById('page-title-divs').textContent = t.title;
      document.getElementById('page-subtitle-divs').textContent = t.subtitle;
      document.getElementById('form-header-div').textContent = document.getElementById('division-id').value ? t.editHeader : t.createHeader;
      document.getElementById('lbl-div-name').textContent = t.nameLabel;
      document.getElementById('lbl-div-code').textContent = t.codeLabel;
      document.getElementById('lbl-div-icon').textContent = t.iconLabel;
      document.getElementById('lbl-div-color').textContent = t.colorLabel;
      document.getElementById('lbl-div-desc').textContent = t.descLabel;
      document.getElementById('lbl-div-order').textContent = t.orderLabel;
      document.getElementById('lbl-div-rank-enable').textContent = t.rankLabel;
      document.getElementById('lbl-div-champ-enable').textContent = t.champLabel;
      document.getElementById('lbl-div-active-enable').textContent = t.activeLabel;
      document.getElementById('submit-btn').textContent = t.saveBtn;
      document.getElementById('cancel-btn').textContent = t.cancelBtn;
      document.getElementById('list-header-div').textContent = t.listHeader;
      
      document.getElementById('th-code').textContent = t.thCode;
      document.getElementById('th-name').textContent = t.thName;
      document.getElementById('th-order').textContent = t.thOrder;
      document.getElementById('th-options').textContent = t.thRules;
      document.getElementById('th-status').textContent = t.thStatus;
      document.getElementById('th-actions').textContent = t.thActions;
    }

    const form = document.getElementById('division-form');
    const tableBody = document.getElementById('divisions-table-body');
    const countBadge = document.getElementById('division-count');
    const cancelBtn = document.getElementById('cancel-btn');

    async function initDivisionsDashboard() {
      try {
        await verifyUserRole(['admin']);
        await loadPortalLayout('admin');
        initializeNavigation();
        applyTranslations();

        // Language toggle event
        document.getElementById('lang-toggle-btn').addEventListener('click', () => {
          currentLang = currentLang === 'en' ? 'ml' : 'en';
          localStorage.setItem('meeladpulse_lang', currentLang);
          applyTranslations();
          renderDivisions();
        });

        // Load and render divisions
        await renderDivisions();

        // Form Submit
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const t = trans[currentLang];
          const submitBtn = document.getElementById('submit-btn');
          submitBtn.disabled = true;
          submitBtn.textContent = t.saving;

          const payload = {
            id: document.getElementById('division-id').value || null,
            name: document.getElementById('div-name-input').value,
            code: document.getElementById('div-code-input').value.toUpperCase().trim(),
            icon: document.getElementById('div-icon-input').value || 'award',
            colour: document.getElementById('div-color-input').value,
            description: document.getElementById('div-desc-input').value,
            order: parseInt(document.getElementById('div-order-input').value) || 1,
            rankingEnabled: document.getElementById('div-ranking-input').checked,
            championEnabled: document.getElementById('div-champion-input').checked,
            active: document.getElementById('div-active-input').checked
          };

          try {
            await saveDivision(payload);
            resetForm();
            await renderDivisions();
          } catch (err) {
            alert("Error saving division: " + err.message);
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = t.saveBtn;
          }
        });

        // Cancel Edit
        cancelBtn.addEventListener('click', () => {
          resetForm();
        });

      } catch (error) {
        console.error("Initialization failed:", error);
      }
    }

    async function renderDivisions() {
      const t = trans[currentLang];
      tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">${t.loading}</td></tr>`;
      
      try {
        const divs = await getDivisions();
        countBadge.textContent = divs.length;

        if (divs.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">${t.noData}</td></tr>`;
          return;
        }

        tableBody.innerHTML = "";
        divs.forEach(d => {
          const row = document.createElement('tr');
          row.className = "hover:bg-slate-50/50 transition";
          
          let rulesBadges = "";
          if (d.rankingEnabled) rulesBadges += `<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-indigo-50 text-indigo-700 mr-1">${t.rankShort}</span>`;
          if (d.championEnabled) rulesBadges += `<span class="inline-flex items-center px-2 py-0.5 rounded text-[10px] font-bold bg-amber-50 text-amber-700">${t.champShort}</span>`;

          const statusBadge = d.active 
            ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-emerald-50 text-emerald-700">● ${t.active}</span>`
            : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-slate-100 text-slate-500">● ${t.inactive}</span>`;

          row.innerHTML = `
            <td class="px-6 py-4 font-mono font-bold text-slate-900">${d.code}</td>
            <td class="px-6 py-4">
              <div class="flex items-center space-x-2.5">
                <span class="h-4 w-4 rounded-full" style="background-color: ${d.colour || '#10b981'}"></span>
                <span class="font-bold text-slate-800">${d.name}</span>
              </div>
            </td>
            <td class="px-6 py-4 text-slate-400 font-medium">${d.order}</td>
            <td class="px-6 py-4">${rulesBadges || "—"}</td>
            <td class="px-6 py-4">${statusBadge}</td>
            <td class="px-6 py-4 text-right space-x-2 shrink-0">
              <button class="edit-btn text-xs font-bold text-emerald-600 hover:text-emerald-700 cursor-pointer" data-id="${d.id}">Edit</button>
              <button class="delete-btn text-xs font-bold text-rose-600 hover:text-rose-700 cursor-pointer" data-id="${d.id}">Delete</button>
            </td>
          `;
          tableBody.appendChild(row);
        });

        // Attach listeners
        document.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            const d = divs.find(item => item.id === id);
            if (d) {
              document.getElementById('division-id').value = d.id;
              document.getElementById('div-name-input').value = d.name;
              document.getElementById('div-code-input').value = d.code;
              document.getElementById('div-icon-input').value = d.icon || '';
              document.getElementById('div-color-input').value = d.colour || '#10b981';
              document.getElementById('div-desc-input').value = d.description || '';
              document.getElementById('div-order-input').value = d.order;
              document.getElementById('div-ranking-input').checked = d.rankingEnabled !== false;
              document.getElementById('div-champion-input').checked = d.championEnabled !== false;
              document.getElementById('div-active-input').checked = d.active !== false;

              document.getElementById('form-header-div').textContent = t.editHeader;
              cancelBtn.classList.remove('hidden');
            }
          });
        });

        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            if (confirm(t.confirmDelete)) {
              btn.disabled = true;
              btn.textContent = t.deleting;
              try {
                await deleteDivision(id);
                await renderDivisions();
              } catch (err) {
                alert("Error deleting division: " + err.message);
              }
            }
          });
        });

      } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-rose-500">Error loading divisions: ${err.message}</td></tr>`;
      }
    }

    function resetForm() {
      const t = trans[currentLang];
      document.getElementById('division-id').value = "";
      form.reset();
      document.getElementById('form-header-div').textContent = t.createHeader;
      cancelBtn.classList.add('hidden');
    }

    initDivisionsDashboard();
  </script>
</body>
</html>
