<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Register Student - Admin Terminal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen">
  
  <div id="global-page-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
    <div class="flex flex-col items-center space-y-3">
      <div class="h-10 w-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div>
      <p class="text-xs font-bold text-slate-700">Verifying Authority Scope...</p>
    </div>
  </div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- Sidebar -->
    <div id="portal-sidebar"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 main-content-layout">
      <!-- Header -->
      <div id="portal-header"></div>

      <main class="flex-1 p-4 lg:p-8 space-y-8 max-w-2xl">
        
        <!-- Header Banner -->
        <div class="bg-white rounded-2xl border border-slate-100 p-6 flex items-center justify-between shadow-xs">
          <div class="space-y-1">
            <h1 class="text-xl font-extrabold text-slate-900 tracking-tight font-display">Register Student</h1>
            <p class="text-xs text-slate-400 font-medium">Add a new student profile directly to the active festival database.</p>
          </div>
          <a href="../admin/students.html" class="btn border border-slate-200 hover:bg-slate-50 text-slate-600 py-1.5 px-3 text-xs font-bold">
            Back to Roster
          </a>
        </div>

        <!-- Form Panel -->
        <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs">
          <form id="student-create-form" class="space-y-4">
            
            <div class="space-y-1.5">
              <label for="student-name" class="text-xs font-bold text-slate-700">Student Full Name</label>
              <input type="text" id="student-name" required class="form-input" placeholder="e.g. Abdullah Khan">
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-4">
              <div class="space-y-1.5">
                <label for="student-chest" class="text-xs font-bold text-slate-700">Chest Number (Assigned)</label>
                <input type="text" id="student-chest" required class="form-input" placeholder="e.g. C105">
                <p class="text-[10px] text-slate-400 font-medium">Must be unique across the entire festival.</p>
              </div>

              <div class="space-y-1.5">
                <label for="student-team" class="text-xs font-bold text-slate-700">Institutional Team (Team ID)</label>
                <select id="student-team" required class="form-input cursor-pointer">
                  <option value="">-- Select competing team --</option>
                </select>
              </div>
            </div>

            <div class="space-y-1.5">
              <label for="student-cat" class="text-xs font-bold text-slate-700">Age Category</label>
              <select id="student-cat" required class="form-input cursor-pointer">
                <option value="">-- Select Category --</option>
              </select>
            </div>

            <div class="pt-4 border-t border-slate-100 flex items-center justify-end space-x-3">
              <a href="../admin/students.html" class="btn border border-slate-200 hover:bg-slate-50 text-slate-600 py-2 px-4 text-xs font-bold">
                Cancel
              </a>
              <button type="submit" class="btn btn-primary py-2 px-4 text-xs font-bold shadow-md cursor-pointer">
                Save Student Record
              </button>
            </div>

          </form>
        </div>

      </main>
    </div>
  </div>

  <script type="module">
    import { verifyUserRole } from "../assets/js/role-guard.js";
    import { loadPortalLayout } from "../assets/js/component-loader.js";
    import { initializeNavigation } from "../assets/js/navigation.js";
    import { getFestivalSettings, createFestivalStudent } from "../assets/js/student-service.js";
    import { getTeams, getCategories } from "../assets/js/firestore-service.js";

    let activeFestId = null;

    async function initPage() {
      try {
        await verifyUserRole(['admin']);
        await loadPortalLayout('admin');
        initializeNavigation();

        activeFestId = localStorage.getItem('meeladpulse_selected_fest_id');
        if (!activeFestId) {
          alert("Please select a festival scope first.");
          window.location.replace('../unauthorized.html?reason=no_scope');
          return;
        }

        // Authority Check: If teamLeadersOnly mode is active, direct creation is blocked for admins.
        const settings = await getFestivalSettings(activeFestId);
        if (settings.studentRegistrationMode === 'teamLeadersOnly') {
          // Block and redirect
          alert("Team Leaders Only Mode is currently active.\nAdmins cannot register students directly in this mode.\n\nടീം ലീഡർമാർക്ക് മാത്രമേ ഈ മോഡിൽ രജിസ്ട്രേഷൻ ചെയ്യുവാൻ അനുവാദമുള്ളൂ.");
          window.location.replace('../admin/students.html?warning=mode_restriction');
          return;
        }

        await populateTeamsDropdown();
        await populateCategoriesDropdown();
        setupFormHandler();

        document.getElementById('global-page-loader').classList.add('hidden');
      } catch (err) {
        console.error("Student create page failed to load:", err);
      }
    }

    async function populateTeamsDropdown() {
      try {
        const teams = await getTeams() || [];
        const dropdown = document.getElementById('student-team');
        teams.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.id;
          opt.textContent = `${t.name} (${t.id.toUpperCase()})`;
          dropdown.appendChild(opt);
        });
      } catch (err) {
        console.error("Failed to load teams:", err);
      }
    }


    async function populateCategoriesDropdown() {
      const dropdown = document.getElementById('student-cat');
      const categories = (await getCategories() || []).filter(cat => cat.active !== false);
      dropdown.innerHTML = '<option value="">-- Select Category --</option>';
      categories.forEach(cat => {
        const opt = document.createElement('option');
        opt.value = cat.id;
        opt.textContent = cat.name || cat.code || cat.id;
        dropdown.appendChild(opt);
      });
    }

    function setupFormHandler() {
      const form = document.getElementById('student-create-form');
      form.onsubmit = async (e) => {
        e.preventDefault();

        const loader = document.getElementById('global-page-loader');
        loader.classList.remove('hidden');

        const studentData = {
          name: document.getElementById('student-name').value.trim(),
          chestNumber: document.getElementById('student-chest').value.trim(),
          teamId: document.getElementById('student-team').value,
          categoryId: document.getElementById('student-cat').value
        };

        try {
          await createFestivalStudent(studentData);
          window.location.replace('../admin/students.html?success=student_registered');
        } catch (err) {
          loader.classList.add('hidden');
          alert("Registration failed: " + err.message);
        }
      };
    }

    initPage();
  </script>
</body>
</html>
