<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Judge Assignments - MeeladPulse</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/css/main.css"></head><body class="bg-slate-50 min-h-screen"><div id="global-page-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center"><div class="h-10 w-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div></div><div class="min-h-screen flex flex-col lg:flex-row"><div id="portal-sidebar"></div><div class="flex-1 flex flex-col min-w-0 main-content-layout"><div id="portal-header"></div><main class="flex-1 p-4 lg:p-8 space-y-8">
<section class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4"><div><h1 class="text-2xl font-extrabold text-slate-900 tracking-tight font-display">Judge Assignments</h1><p class="text-xs text-slate-400 font-medium">Assign already-created judge accounts to competitions after checking entry count, schedule and workload.</p></div><a href="../admin/schedule-management.html" class="btn btn-secondary text-xs font-bold px-4 py-2 border border-slate-200 rounded-xl">Schedule Management</a></section>
<section id="warning-panel" class="hidden rounded-2xl border border-amber-200 bg-amber-50 p-4 text-xs text-amber-800 font-semibold"></section>
<section class="grid grid-cols-1 xl:grid-cols-3 gap-6"><div class="xl:col-span-2 bg-white rounded-2xl border border-slate-100 p-6 shadow-xs space-y-4"><h2 class="text-sm font-extrabold text-slate-900">Assign Competition</h2><form id="assign-form" class="grid grid-cols-1 md:grid-cols-2 gap-4"><div class="space-y-1.5"><label class="label-xs">Judge</label><select id="select-judge" required class="form-input"></select></div><div class="space-y-1.5"><label class="label-xs">Competition</label><select id="select-competition" required class="form-input"></select></div><label class="inline-flex items-center gap-2 text-xs font-bold text-slate-600"><input id="head-judge" type="checkbox" class="rounded border-slate-300"> Head Judge</label><button class="btn btn-accent bg-slate-950 text-white text-xs font-bold px-4 py-2.5 rounded-xl">Save Assignment</button></form></div><div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs"><h2 class="text-sm font-extrabold text-slate-900 mb-3">Judge Workload</h2><div id="workload" class="space-y-2 text-xs"></div></div></section>
<section class="grid grid-cols-1 md:grid-cols-4 xl:grid-cols-8 gap-3"><input id="search" class="form-input" placeholder="Search judge/event"><select id="filter-date" class="form-input"><option value="">All dates</option></select><select id="filter-stage" class="form-input"><option value="">All stages</option></select><select id="filter-category" class="form-input"><option value="">All categories</option></select><select id="filter-gender" class="form-input"><option value="">All genders</option></select><select id="filter-division" class="form-input"><option value="">Arts/Sports</option></select><select id="filter-assigned" class="form-input"><option value="">Assigned + Unassigned</option><option value="assigned">Assigned</option><option value="unassigned">Unassigned</option></select><select id="filter-scheduled" class="form-input"><option value="">Scheduled + Not</option><option value="scheduled">Scheduled</option><option value="unscheduled">Not scheduled</option></select></section>
<section class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-xs"><div class="p-5 border-b border-slate-100 bg-slate-50/50"><h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Competitions, entry counts and assigned judges</h2></div><div class="table-container overflow-x-auto"><table class="w-full text-left border-collapse min-w-[1050px]"><thead><tr class="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest"><th class="px-6 py-4">Competition</th><th class="px-6 py-4">Schedule</th><th class="px-6 py-4">Entry Count</th><th class="px-6 py-4">Assigned Judges</th><th class="px-6 py-4">Workload Warning</th><th class="px-6 py-4 text-right">Actions</th></tr></thead><tbody id="assignment-body" class="divide-y divide-slate-100 text-xs text-slate-700"></tbody></table></div></section>
</main></div></div><script type="module">
import { verifyUserRole } from '../assets/js/role-guard.js';import { loadPortalLayout } from '../assets/js/component-loader.js';import { initializeNavigation } from '../assets/js/navigation.js';import { getCompetitions,getCompetitionEntries,getSchedules } from '../assets/js/firestore-service.js';import { getJudges,getJudgeAssignments,saveJudgeAssignment,deleteJudgeAssignment } from '../assets/js/judge-service.js';
const $=id=>document.getElementById(id);let judges=[],competitions=[],entries=[],schedules=[],assignments=[];const fmt=s=>s||'-';function scheduleFor(id){return schedules.find(s=>s.competitionId===id)||{};}function entriesFor(id){const rows=entries.filter(e=>e.competitionId===id&&e.status!=='rejected');return{rows,teams:rows.length,participants:rows.reduce((n,e)=>n+(e.studentIds||[]).length,0)}}function assignsFor(id){return assignments.filter(a=>a.competitionId===id&&a.active!==false)}function workload(judgeId){return assignments.filter(a=>a.judgeId===judgeId&&a.active!==false)}function overlaps(a,b,c,d){return a<d&&c<b;}function judgeConflict(judgeId,compId){const sch=scheduleFor(compId);if(!sch.date||!sch.startTime||!sch.endTime)return[];return workload(judgeId).filter(a=>a.competitionId!==compId).filter(a=>{const os=scheduleFor(a.competitionId);return os.date===sch.date&&overlaps(sch.startTime,sch.endTime,os.startTime,os.endTime);});}
function renderSelectors(){judges=judges.filter(j=>j.active!==false);$('select-judge').innerHTML='<option value="">Choose judge</option>'+judges.map(j=>`<option value="${j.uid||j.id}">${j.name||j.usernameLower} (${workload(j.uid||j.id).length})</option>`).join('');$('select-competition').innerHTML='<option value="">Choose competition</option>'+competitions.map(c=>`<option value="${c.id}">${c.name||c.title||c.id} — ${entriesFor(c.id).participants||entriesFor(c.id).teams} entries</option>`).join('');}
function renderFilterOptions(){const opts=(arr)=>[...new Set(arr.filter(Boolean))];$('filter-date').innerHTML='<option value="">All dates</option>'+opts(schedules.map(s=>s.date)).map(v=>`<option>${v}</option>`).join('');$('filter-stage').innerHTML='<option value="">All stages</option>'+opts(schedules.map(s=>s.stage)).map(v=>`<option>${v}</option>`).join('');$('filter-category').innerHTML='<option value="">All categories</option>'+opts(competitions.map(c=>c.categoryId||c.category||c.categoryName)).map(v=>`<option>${v}</option>`).join('');$('filter-gender').innerHTML='<option value="">All genders</option>'+opts(competitions.map(c=>c.genderMode||c.gender)).map(v=>`<option>${v}</option>`).join('');$('filter-division').innerHTML='<option value="">Arts/Sports</option>'+opts(competitions.map(c=>c.divisionId||c.programmeType||c.type)).map(v=>`<option>${v}</option>`).join('');}
function renderWorkload(){$('workload').innerHTML=judges.length?judges.map(j=>{const list=workload(j.uid||j.id);const participantCount=list.reduce((n,a)=>n+entriesFor(a.competitionId).participants,0);return`<div class="rounded-xl border border-slate-100 p-3 flex justify-between"><span class="font-bold text-slate-800">${j.name||j.usernameLower}</span><span>${list.length} competitions / ${participantCount} entries</span></div>`}).join(''):'<p class="text-slate-400">No judges.</p>';}
function filteredCompetitions(){const q=$('search').value.toLowerCase(),fd=$('filter-date').value,fs=$('filter-stage').value,fc=$('filter-category').value,fg=$('filter-gender').value,fdv=$('filter-division').value,fa=$('filter-assigned').value,fsch=$('filter-scheduled').value;return competitions.filter(c=>{const sch=scheduleFor(c.id), as=assignsFor(c.id);return(!q||`${c.name} ${c.code} ${as.map(a=>a.judgeName).join(' ')}`.toLowerCase().includes(q))&&(!fd||sch.date===fd)&&(!fs||sch.stage===fs)&&(!fc||(c.categoryId||c.category||c.categoryName)===fc)&&(!fg||(c.genderMode||c.gender)===fg)&&(!fdv||(c.divisionId||c.programmeType||c.type)===fdv)&&(!fa||(fa==='assigned'?as.length>0:as.length===0))&&(!fsch||(fsch==='scheduled'?!!sch.id:!sch.id));});}
function renderTable(){const rows=filteredCompetitions();$('assignment-body').innerHTML=rows.length?rows.map(c=>{const sch=scheduleFor(c.id),stats=entriesFor(c.id),as=assignsFor(c.id),warning=!sch.id?'Not scheduled':(as.length===0?'No judge assigned':'');return`<tr><td class="px-6 py-4"><div class="font-bold text-slate-900">${c.name||c.title||c.id}</div><div class="text-[10px] text-slate-400">${fmt(c.categoryId||c.categoryName)} • ${fmt(c.genderMode||c.gender)} • ${fmt(c.divisionId||c.type)}</div></td><td class="px-6 py-4 font-mono">${sch.id?`${sch.date} ${sch.startTime}-${sch.endTime}<br>${sch.stage||''}`:'Not scheduled'}</td><td class="px-6 py-4"><button class="entry-list font-bold text-emerald-700" data-id="${c.id}">${stats.teams} teams / ${stats.participants} participants</button></td><td class="px-6 py-4">${as.length?as.map(a=>`<span class="inline-flex m-0.5 px-2 py-1 rounded-full bg-slate-100 font-bold">${a.judgeName}<button class="remove ml-2 text-rose-600" data-id="${a.id}">×</button></span>`).join(''):'<span class="text-slate-400">Unassigned</span>'}</td><td class="px-6 py-4 text-amber-700 font-bold">${warning}</td><td class="px-6 py-4 text-right"><button class="quick text-xs font-bold text-slate-900" data-id="${c.id}">Select</button></td></tr>`}).join(''):'<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">No competitions match filters.</td></tr>';document.querySelectorAll('.quick').forEach(b=>b.onclick=()=>{$('select-competition').value=b.dataset.id;window.scrollTo({top:0,behavior:'smooth'});});document.querySelectorAll('.remove').forEach(b=>b.onclick=async()=>{if(confirm('Remove this assignment?')){await deleteJudgeAssignment(b.dataset.id);await load();}});document.querySelectorAll('.entry-list').forEach(b=>b.onclick=()=>{const list=entriesFor(b.dataset.id).rows.map(e=>`${e.entryName||e.id}: ${(e.studentIds||[]).length} participant(s)`).join('\n')||'No entries';alert(list);});}
function warnAssignment(judgeId,compId){const conflicts=judgeConflict(judgeId,compId);const panel=$('warning-panel');panel.classList.toggle('hidden',!conflicts.length);panel.innerHTML=conflicts.map(c=>`⚠ ${judges.find(j=>(j.uid||j.id)===judgeId)?.name} has schedule conflict with ${c.competitionName}.`).join('<br>');return conflicts;}
async function load(){[judges,competitions,entries,schedules,assignments]=await Promise.all([getJudges(),getCompetitions(),getCompetitionEntries(),getSchedules(),getJudgeAssignments()]);renderSelectors();renderFilterOptions();renderWorkload();renderTable();}
async function init(){await verifyUserRole(['admin']);await loadPortalLayout('admin');initializeNavigation();['search','filter-date','filter-stage','filter-category','filter-gender','filter-division','filter-assigned','filter-scheduled'].forEach(id=>$(id).oninput=renderTable);['select-judge','select-competition'].forEach(id=>$(id).onchange=()=>warnAssignment($('select-judge').value,$('select-competition').value));$('assign-form').onsubmit=async e=>{e.preventDefault();const judge=judges.find(j=>(j.uid||j.id)===$('select-judge').value),c=competitions.find(x=>x.id===$('select-competition').value);if(!judge||!c)return alert('Choose judge and competition.');const conflicts=warnAssignment(judge.uid||judge.id,c.id);if(conflicts.length&&!confirm('Schedule conflict warning exists. Save assignment anyway?'))return;await saveJudgeAssignment(judge.uid||judge.id,judge.name||judge.usernameLower,c.id,c.name||c.title||c.id,$('head-judge').checked);$('assign-form').reset();$('warning-panel').classList.add('hidden');await load();};await load();$('global-page-loader').classList.add('hidden');}
init().catch(e=>{console.error(e);$('global-page-loader').classList.add('hidden');alert(e.message||e);});
</script></body></html>
