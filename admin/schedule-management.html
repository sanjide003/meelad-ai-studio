<!DOCTYPE html>
<html lang="en">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Schedule Management - MeeladPulse</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/css/main.css"></head>
<body class="bg-slate-50 min-h-screen"><div id="global-page-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center"><div class="h-10 w-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div></div><div class="min-h-screen flex flex-col lg:flex-row"><div id="portal-sidebar"></div><div class="flex-1 flex flex-col min-w-0 main-content-layout"><div id="portal-header"></div><main class="flex-1 p-4 lg:p-8 space-y-8">
<section class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs flex flex-col lg:flex-row lg:items-center lg:justify-between gap-4"><div><h1 class="text-2xl font-extrabold text-slate-900 tracking-tight font-display">Schedule Management</h1><p class="text-xs text-slate-400 font-medium">Plan date, reporting time, start/end time, stage and duration with entry-count based conflict warnings.</p></div><button id="new-schedule" class="btn btn-accent bg-slate-950 text-white text-xs font-bold px-4 py-2 rounded-xl">New Schedule</button></section>
<section id="warning-panel" class="hidden rounded-2xl border border-amber-200 bg-amber-50 p-4 text-xs text-amber-800 font-semibold"></section>
<section class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs"><form id="schedule-form" class="grid grid-cols-1 md:grid-cols-2 xl:grid-cols-4 gap-4"><input type="hidden" id="schedule-id"><div class="space-y-1.5"><label class="label-xs">Competition</label><select id="competition-id" required class="form-input"></select></div><div class="space-y-1.5"><label class="label-xs">Date</label><input id="date" type="date" required class="form-input"></div><div class="space-y-1.5"><label class="label-xs">Reporting Time</label><input id="reporting-time" type="time" class="form-input"></div><div class="space-y-1.5"><label class="label-xs">Start Time</label><input id="start-time" type="time" required class="form-input"></div><div class="space-y-1.5"><label class="label-xs">End Time</label><input id="end-time" type="time" required class="form-input"></div><div class="space-y-1.5"><label class="label-xs">Stage / Venue</label><input id="stage" required class="form-input" placeholder="Stage 1"></div><div class="space-y-1.5"><label class="label-xs">Status</label><select id="status" class="form-input"><option value="scheduled">Scheduled</option><option value="ongoing">Ongoing</option><option value="completed">Completed</option><option value="postponed">Postponed</option></select></div><div class="space-y-1.5"><label class="label-xs">Minutes per entry/team</label><input id="minutes-per-entry" type="number" min="1" value="4" class="form-input"></div><div class="space-y-1.5 xl:col-span-3"><label class="label-xs">Notes</label><input id="notes" class="form-input" placeholder="Optional notes"></div><div class="flex items-end"><button id="save-schedule" class="btn btn-accent bg-slate-950 text-white text-xs font-bold px-4 py-2.5 rounded-xl w-full">Save Schedule</button></div></form></section>
<section class="grid grid-cols-1 md:grid-cols-4 gap-3"><select id="filter-date" class="form-input"><option value="">All dates</option></select><select id="filter-stage" class="form-input"><option value="">All stages</option></select><select id="filter-status" class="form-input"><option value="">All statuses</option><option value="scheduled">Scheduled</option><option value="ongoing">Ongoing</option><option value="completed">Completed</option><option value="postponed">Postponed</option></select><input id="search" class="form-input" placeholder="Search competition/stage"></section>
<section class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-xs"><div class="p-5 border-b border-slate-100 bg-slate-50/50"><h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Scheduled competitions</h2></div><div class="table-container overflow-x-auto"><table class="w-full text-left border-collapse min-w-[900px]"><thead><tr class="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest"><th class="px-6 py-4">Competition</th><th class="px-6 py-4">Date / Time</th><th class="px-6 py-4">Stage</th><th class="px-6 py-4">Entries</th><th class="px-6 py-4">Status</th><th class="px-6 py-4 text-right">Actions</th></tr></thead><tbody id="schedule-body" class="divide-y divide-slate-100 text-xs text-slate-700"></tbody></table></div></section>
</main></div></div><script type="module">
import { verifyUserRole } from '../assets/js/role-guard.js';import { loadPortalLayout } from '../assets/js/component-loader.js';import { initializeNavigation } from '../assets/js/navigation.js';import { getCompetitions,getCompetitionEntries,getSchedules,saveSchedule,deleteSchedule } from '../assets/js/firestore-service.js';import { getJudgeAssignments } from '../assets/js/judge-service.js';
const $=id=>document.getElementById(id);let competitions=[],entries=[],schedules=[],assignments=[];
function overlaps(a,b,c,d){return a<d&&c<b;}function comp(id){return competitions.find(c=>c.id===id)||{};}function entryStats(id){const rows=entries.filter(e=>e.competitionId===id&&e.status!=='rejected');const participants=rows.reduce((sum,e)=>sum+(e.studentIds||[]).length,0);return{teams:rows.length,participants};}
function selectedPayload(){const c=comp($('competition-id').value);const stats=entryStats(c.id);const mins=Number($('minutes-per-entry').value)||4;return{id:$('schedule-id').value||null,competitionId:c.id,competitionName:c.name||c.title||'',date:$('date').value,reportingTime:$('reporting-time').value,startTime:$('start-time').value,endTime:$('end-time').value,stage:$('stage').value.trim(),venue:$('stage').value.trim(),status:$('status').value,notes:$('notes').value,estimatedDurationMinutes:Math.max(stats.teams,stats.participants)*mins,entryCount:stats.participants||stats.teams,teamEntryCount:stats.teams,participantCount:stats.participants};}
function warnings(payload){const out=[];if(payload.endTime<=payload.startTime)out.push('End time must be after start time.');schedules.filter(s=>s.id!==payload.id&&s.date===payload.date).forEach(s=>{if(payload.stage&&s.stage===payload.stage&&overlaps(payload.startTime,payload.endTime,s.startTime,s.endTime))out.push(`Stage conflict with ${s.competitionName}.`);});const assignedJudges=assignments.filter(a=>a.competitionId===payload.competitionId).map(a=>a.judgeId);schedules.filter(s=>s.id!==payload.id&&s.date===payload.date&&overlaps(payload.startTime,payload.endTime,s.startTime,s.endTime)).forEach(s=>{const other=assignments.filter(a=>a.competitionId===s.competitionId&&assignedJudges.includes(a.judgeId));other.forEach(a=>out.push(`Judge conflict: ${a.judgeName} is already assigned to ${s.competitionName}.`));});const duration=((new Date(`2000-01-01T${payload.endTime}`)-new Date(`2000-01-01T${payload.startTime}`))/60000)||0;if(payload.estimatedDurationMinutes&&duration&&payload.estimatedDurationMinutes>duration)out.push(`Estimated duration ${payload.estimatedDurationMinutes} minutes is greater than planned ${duration} minutes.`);if(assignedJudges.length===0)out.push('No judge assigned for this competition yet.');return out;}
function showWarnings(list){$('warning-panel').classList.toggle('hidden',!list.length);$('warning-panel').innerHTML=list.map(w=>`<div>⚠ ${w}</div>`).join('');}
function renderFilters(){const dates=[...new Set(schedules.map(s=>s.date).filter(Boolean))],stages=[...new Set(schedules.map(s=>s.stage).filter(Boolean))];$('filter-date').innerHTML='<option value="">All dates</option>'+dates.map(v=>`<option>${v}</option>`).join('');$('filter-stage').innerHTML='<option value="">All stages</option>'+stages.map(v=>`<option>${v}</option>`).join('');}
function render(){const q=$('search').value.toLowerCase(),fd=$('filter-date').value,fs=$('filter-stage').value,fst=$('filter-status').value;const rows=schedules.filter(s=>(!fd||s.date===fd)&&(!fs||s.stage===fs)&&(!fst||s.status===fst)&&(`${s.competitionName} ${s.stage}`.toLowerCase().includes(q)));$('schedule-body').innerHTML=rows.length?rows.map(s=>`<tr><td class="px-6 py-4 font-bold text-slate-900">${s.competitionName||s.competitionId}</td><td class="px-6 py-4 font-mono">${s.date}<br>${s.reportingTime?`Report ${s.reportingTime} • `:''}${s.startTime}-${s.endTime}</td><td class="px-6 py-4 font-semibold">${s.stage||'-'}</td><td class="px-6 py-4">${s.teamEntryCount||0} teams / ${s.participantCount||s.entryCount||0} participants</td><td class="px-6 py-4"><span class="status-badge status-badge-info">${s.status||'scheduled'}</span></td><td class="px-6 py-4 text-right space-x-2"><button class="edit text-emerald-700 font-bold" data-id="${s.id}">Edit</button><button class="del text-rose-600 font-bold" data-id="${s.id}">Delete</button></td></tr>`).join(''):'<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">No schedules match.</td></tr>';document.querySelectorAll('.edit').forEach(b=>b.onclick=()=>editSchedule(b.dataset.id));document.querySelectorAll('.del').forEach(b=>b.onclick=async()=>{if(confirm('Delete this schedule?')){await deleteSchedule(b.dataset.id);await load();}});}
function editSchedule(id){const s=schedules.find(x=>x.id===id);if(!s)return;$('schedule-id').value=s.id;$('competition-id').value=s.competitionId;$('date').value=s.date||'';$('reporting-time').value=s.reportingTime||'';$('start-time').value=s.startTime||'';$('end-time').value=s.endTime||'';$('stage').value=s.stage||'';$('status').value=s.status||'scheduled';$('notes').value=s.notes||'';showWarnings(warnings(selectedPayload()));window.scrollTo({top:0,behavior:'smooth'});}
async function load(){[competitions,entries,schedules,assignments]=await Promise.all([getCompetitions(),getCompetitionEntries(),getSchedules(),getJudgeAssignments()]);$('competition-id').innerHTML='<option value="">Choose competition</option>'+competitions.map(c=>`<option value="${c.id}">${c.name||c.title||c.id}</option>`).join('');renderFilters();render();}
async function init(){await verifyUserRole(['admin']);await loadPortalLayout('admin');initializeNavigation();['filter-date','filter-stage','filter-status','search'].forEach(id=>$(id).oninput=render);['competition-id','date','reporting-time','start-time','end-time','stage','minutes-per-entry'].forEach(id=>$(id).oninput=()=>showWarnings(warnings(selectedPayload())));$('new-schedule').onclick=()=>{$('schedule-form').reset();$('schedule-id').value='';showWarnings([]);};$('schedule-form').onsubmit=async e=>{e.preventDefault();const payload=selectedPayload();const list=warnings(payload);showWarnings(list);if(list.some(w=>w.includes('Stage conflict')||w.includes('End time')))return;await saveSchedule(payload);$('schedule-form').reset();showWarnings([]);await load();};await load();$('global-page-loader').classList.add('hidden');}
init().catch(e=>{console.error(e);$('global-page-loader').classList.add('hidden');alert(e.message||e);});
</script></body></html>
