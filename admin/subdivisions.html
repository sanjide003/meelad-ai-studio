<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subdivisions Management - MeeladPulse</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen">
  
  <div id="global-page-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
    <div class="flex flex-col items-center space-y-3">
      <div class="h-10 w-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div>
      <p class="text-xs font-bold text-slate-700">Loading Subdivisions Workspace...</p>
    </div>
  </div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    <!-- Sidebar -->
    <div id="portal-sidebar"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 main-content-layout">
      <!-- Header -->
      <div id="portal-header"></div>

      <main class="flex-1 p-4 lg:p-8 space-y-8">
        
        <!-- Header Banner & Translation Toggle -->
        <div class="bg-white rounded-2xl border border-slate-100 p-6 flex flex-col sm:flex-row sm:items-center justify-between gap-4 shadow-xs">
          <div class="space-y-1">
            <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight font-display" id="page-title-sub">Subdivisions Configuration</h1>
            <p class="text-xs text-slate-400 font-medium" id="page-subtitle-sub">Manage subdivisions (e.g. Sub-junior, Junior, Senior) within parent divisions.</p>
          </div>
          <div class="flex items-center space-x-2">
            <button id="lang-toggle-btn" class="btn btn-secondary text-xs py-2 px-3 flex items-center space-x-1 border border-slate-200 cursor-pointer">
              <span>English / മലയാളം</span>
            </button>
          </div>
        </div>

        <div class="grid grid-cols-1 xl:grid-cols-3 gap-8 items-start">
          
          <!-- Add/Edit Form Card -->
          <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs space-y-5 xl:col-span-1">
            <h2 class="text-sm font-bold text-slate-800 font-display" id="form-header-sub">Create New Subdivision</h2>
            
            <form id="subdivision-form" class="space-y-4">
              <input type="hidden" id="subdivision-id">
              
              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700 block" id="lbl-sub-parent">Parent Division</label>
                <select id="sub-parent-select" required class="form-input cursor-pointer">
                  <option value="">-- Select parent division --</option>
                </select>
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700 block" id="lbl-sub-name">Subdivision Name</label>
                <input type="text" id="sub-name-input" required class="form-input" placeholder="e.g. Junior (ജൂനിയർ)">
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700 block" id="lbl-sub-code">Subdivision Code</label>
                <input type="text" id="sub-code-input" required class="form-input" placeholder="e.g. JUN / SEN">
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700 block" id="lbl-sub-desc">Description</label>
                <textarea id="sub-desc-input" class="form-input" rows="2" placeholder="Brief details..."></textarea>
              </div>

              <div class="space-y-1.5">
                <label class="text-xs font-bold text-slate-700 block" id="lbl-sub-order">Display Sort Order</label>
                <input type="number" id="sub-order-input" required class="form-input" value="1">
              </div>

              <div class="space-y-3 pt-2">
                <label class="flex items-center space-x-2.5 cursor-pointer">
                  <input type="checkbox" id="sub-ranking-input" checked class="rounded border-slate-300 text-emerald-500 focus:ring-emerald-500 h-4 w-4">
                  <span class="text-xs font-bold text-slate-700" id="lbl-sub-rank-enable">Enable Subdivision Championship Ranking</span>
                </label>

                <label class="flex items-center space-x-2.5 cursor-pointer">
                  <input type="checkbox" id="sub-champion-input" checked class="rounded border-slate-300 text-emerald-500 focus:ring-emerald-500 h-4 w-4">
                  <span class="text-xs font-bold text-slate-700" id="lbl-sub-champ-enable">Enable Individual Championship</span>
                </label>

                <label class="flex items-center space-x-2.5 cursor-pointer">
                  <input type="checkbox" id="sub-active-input" checked class="rounded border-slate-300 text-emerald-500 focus:ring-emerald-500 h-4 w-4">
                  <span class="text-xs font-bold text-slate-700" id="lbl-sub-active-enable">Subdivision Active</span>
                </label>
              </div>

              <div class="flex items-center space-x-2 pt-2">
                <button type="submit" id="submit-btn" class="flex-1 btn btn-accent py-2.5 text-xs font-bold text-white cursor-pointer shadow-sm">
                  Save Subdivision
                </button>
                <button type="button" id="cancel-btn" class="hidden btn btn-secondary py-2.5 text-xs font-bold text-slate-700 cursor-pointer">
                  Cancel
                </button>
              </div>
            </form>
          </div>

          <!-- Subdivisions List Panel -->
          <div class="bg-white rounded-2xl border border-slate-100 shadow-xs xl:col-span-2 overflow-hidden">
            <div class="p-5 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
              <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider" id="list-header-sub">Configured Subdivisions</h2>
              <span id="subdivision-count" class="text-xs font-bold bg-slate-100 text-slate-600 py-1 px-2.5 rounded-full">0</span>
            </div>

            <div class="table-container">
              <table class="w-full text-left border-collapse">
                <thead>
                  <tr class="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50/20">
                    <th class="px-6 py-4" id="th-code">Code</th>
                    <th class="px-6 py-4" id="th-name">Subdivision</th>
                    <th class="px-6 py-4" id="th-parent">Parent Division</th>
                    <th class="px-6 py-4" id="th-order">Sort Order</th>
                    <th class="px-6 py-4" id="th-status">Status</th>
                    <th class="px-6 py-4 text-right" id="th-actions">Actions</th>
                  </tr>
                </thead>
                <tbody id="subdivisions-table-body" class="divide-y divide-slate-100 text-xs text-slate-700">
                  <tr>
                    <td colspan="6" class="px-6 py-12 text-center text-slate-400">Loading subdivisions history...</td>
                  </tr>
                </tbody>
              </table>
            </div>
          </div>

        </div>

      </main>
    </div>
  </div>

  <script type="module">
    import { verifyUserRole } from "/assets/js/role-guard.js";
    import { loadPortalLayout } from "/assets/js/component-loader.js";
    import { initializeNavigation } from "/assets/js/navigation.js";
    import { getDivisions, getSubdivisions, saveSubdivision, deleteSubdivision } from "/assets/js/firestore-service.js";

    let currentLang = localStorage.getItem('meeladpulse_lang') || 'en';

    const trans = {
      en: {
        title: "Subdivisions Configuration",
        subtitle: "Manage subdivisions (e.g. Sub-junior, Junior, Senior) within parent divisions.",
        createHeader: "Create New Subdivision",
        editHeader: "Edit Subdivision",
        parentLabel: "Parent Division",
        nameLabel: "Subdivision Name",
        codeLabel: "Subdivision Code",
        descLabel: "Description",
        orderLabel: "Display Sort Order",
        rankLabel: "Enable Subdivision Championship Ranking",
        champLabel: "Enable Individual Championship",
        activeLabel: "Subdivision Active",
        saveBtn: "Save Subdivision",
        cancelBtn: "Cancel",
        listHeader: "Configured Subdivisions",
        thCode: "Code",
        thName: "Subdivision",
        thParent: "Parent Division",
        thOrder: "Sort Order",
        thStatus: "Status",
        thActions: "Actions",
        loading: "Loading subdivisions history...",
        noData: "No subdivisions configured for this festival.",
        confirmDelete: "Are you sure you want to delete this subdivision?",
        active: "Active",
        inactive: "Inactive",
        saving: "Saving...",
        deleting: "Deleting..."
      },
      ml: {
        title: "സബ് ഡിവിഷനുകൾ",
        subtitle: "മാതൃ ഡിവിഷനുകൾക്ക് കീഴിലുള്ള സബ് ഡിവിഷനുകൾ (ഉദാഹരണത്തിന്: സബ് ജൂനിയർ, ജൂനിയർ, സീനിയർ) ക്രമീകരിക്കുക.",
        createHeader: "പുതിയ സബ് ഡിവിഷൻ സൃഷ്ടിക്കുക",
        editHeader: "സബ് ഡിവിഷൻ തിരുത്തുക",
        parentLabel: "മാതൃ ഡിവിഷൻ (പേരന്റ് ഡിവിഷൻ)",
        nameLabel: "സബ് ഡിവിഷൻ പേര്",
        codeLabel: "സബ് ഡിവിഷൻ കോഡ്",
        descLabel: "വിവരണം",
        orderLabel: "ക്രമം (സോർട്ട് ഓർഡർ)",
        rankLabel: "സബ് ഡിവിഷൻ ചാമ്പ്യൻഷിപ്പ് റാങ്കിംഗ് അനുവദിക്കുക",
        champLabel: "വ്യക്തിഗത ചാമ്പ്യൻഷിപ്പ് അനുവദിക്കുക",
        activeLabel: "സബ് ഡിവിഷൻ സജീവം",
        saveBtn: "സബ് ഡിവിഷൻ സേവ് ചെയ്യുക",
        cancelBtn: "റദ്ദാക്കുക",
        listHeader: "നിലവിലുള്ള സബ് ഡിവിഷനുകൾ",
        thCode: "കോഡ്",
        thName: "സബ് ഡിവിഷൻ",
        thParent: "മാതൃ ഡിവിഷൻ",
        thOrder: "ക്രമം",
        thStatus: "നില",
        thActions: "നടപടികൾ",
        loading: "വിവരങ്ങൾ ശേഖരിക്കുന്നു...",
        noData: "ഈ ഫെസ്റ്റിവലിൽ സബ് ഡിവിഷനുകളൊന്നും ക്രമീകരിച്ചിട്ടില്ല.",
        confirmDelete: "ഈ സബ് ഡിവിഷൻ ഇല്ലാതാക്കാൻ നിങ്ങൾക്ക് ഉറപ്പാണോ?",
        active: "സജീവം",
        inactive: "സജീവമല്ല",
        saving: "സേവ് ചെയ്യുന്നു...",
        deleting: "ഡിലീറ്റ് ചെയ്യുന്നു..."
      }
    };

    function applyTranslations() {
      const t = trans[currentLang];
      document.getElementById('page-title-sub').textContent = t.title;
      document.getElementById('page-subtitle-sub').textContent = t.subtitle;
      document.getElementById('form-header-sub').textContent = document.getElementById('subdivision-id').value ? t.editHeader : t.createHeader;
      document.getElementById('lbl-sub-parent').textContent = t.parentLabel;
      document.getElementById('lbl-sub-name').textContent = t.nameLabel;
      document.getElementById('lbl-sub-code').textContent = t.codeLabel;
      document.getElementById('lbl-sub-desc').textContent = t.descLabel;
      document.getElementById('lbl-sub-order').textContent = t.orderLabel;
      document.getElementById('lbl-sub-rank-enable').textContent = t.rankLabel;
      document.getElementById('lbl-sub-champ-enable').textContent = t.champLabel;
      document.getElementById('lbl-sub-active-enable').textContent = t.activeLabel;
      document.getElementById('submit-btn').textContent = t.saveBtn;
      document.getElementById('cancel-btn').textContent = t.cancelBtn;
      document.getElementById('list-header-sub').textContent = t.listHeader;
      
      document.getElementById('th-code').textContent = t.thCode;
      document.getElementById('th-name').textContent = t.thName;
      document.getElementById('th-parent').textContent = t.thParent;
      document.getElementById('th-order').textContent = t.thOrder;
      document.getElementById('th-status').textContent = t.thStatus;
      document.getElementById('th-actions').textContent = t.thActions;
    }

    const form = document.getElementById('subdivision-form');
    const tableBody = document.getElementById('subdivisions-table-body');
    const countBadge = document.getElementById('subdivision-count');
    const parentSelect = document.getElementById('sub-parent-select');
    const cancelBtn = document.getElementById('cancel-btn');

    let globalDivisions = [];

    async function initSubdivisionsDashboard() {
      try {
        await verifyUserRole(['admin']);
        await loadPortalLayout('admin');
        initializeNavigation();
        applyTranslations();

        // Load parents
        globalDivisions = await getDivisions();
        renderParentSelect();

        // Language toggle
        document.getElementById('lang-toggle-btn').addEventListener('click', () => {
          currentLang = currentLang === 'en' ? 'ml' : 'en';
          localStorage.setItem('meeladpulse_lang', currentLang);
          applyTranslations();
          renderParentSelect();
          renderSubdivisions();
        });

        await renderSubdivisions();

        // Submit form
        form.addEventListener('submit', async (e) => {
          e.preventDefault();
          const t = trans[currentLang];
          const submitBtn = document.getElementById('submit-btn');
          submitBtn.disabled = true;
          submitBtn.textContent = t.saving;

          const payload = {
            id: document.getElementById('subdivision-id').value || null,
            divisionId: parentSelect.value,
            name: document.getElementById('sub-name-input').value,
            code: document.getElementById('sub-code-input').value.toUpperCase().trim(),
            description: document.getElementById('sub-desc-input').value,
            order: parseInt(document.getElementById('sub-order-input').value) || 1,
            rankingEnabled: document.getElementById('sub-ranking-input').checked,
            championEnabled: document.getElementById('sub-champion-input').checked,
            active: document.getElementById('sub-active-input').checked
          };

          try {
            await saveSubdivision(payload);
            resetForm();
            await renderSubdivisions();
          } catch (err) {
            alert("Error saving subdivision: " + err.message);
          } finally {
            submitBtn.disabled = false;
            submitBtn.textContent = t.saveBtn;
          }
        });

        cancelBtn.addEventListener('click', () => {
          resetForm();
        });

      } catch (error) {
        console.error("Initialization error:", error);
      }
    }

    function renderParentSelect() {
      const selected = parentSelect.value;
      parentSelect.innerHTML = `<option value="">-- Choose active parent --</option>`;
      globalDivisions.forEach(d => {
        const opt = document.createElement('option');
        opt.value = d.id;
        opt.textContent = `${d.name} (${d.code})`;
        if (d.id === selected) opt.selected = true;
        parentSelect.appendChild(opt);
      });
    }

    async function renderSubdivisions() {
      const t = trans[currentLang];
      tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">${t.loading}</td></tr>`;
      
      try {
        const subs = await getSubdivisions();
        countBadge.textContent = subs.length;

        if (subs.length === 0) {
          tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">${t.noData}</td></tr>`;
          return;
        }

        tableBody.innerHTML = "";
        subs.forEach(s => {
          const parent = globalDivisions.find(div => div.id === s.divisionId);
          const parentName = parent ? parent.name : "Unknown Division";
          
          const row = document.createElement('tr');
          row.className = "hover:bg-slate-50/50 transition";

          const statusBadge = s.active 
            ? `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-emerald-50 text-emerald-700">● ${t.active}</span>`
            : `<span class="inline-flex items-center px-2.5 py-0.5 rounded-full text-[10px] font-bold bg-slate-100 text-slate-500">● ${t.inactive}</span>`;

          row.innerHTML = `
            <td class="px-6 py-4 font-mono font-bold text-slate-900">${s.code}</td>
            <td class="px-6 py-4 font-bold text-slate-850">${s.name}</td>
            <td class="px-6 py-4 text-slate-500 font-medium">${parentName}</td>
            <td class="px-6 py-4 text-slate-400 font-medium">${s.order}</td>
            <td class="px-6 py-4">${statusBadge}</td>
            <td class="px-6 py-4 text-right space-x-2 shrink-0">
              <button class="edit-btn text-xs font-bold text-emerald-600 hover:text-emerald-700 cursor-pointer" data-id="${s.id}">Edit</button>
              <button class="delete-btn text-xs font-bold text-rose-600 hover:text-rose-700 cursor-pointer" data-id="${s.id}">Delete</button>
            </td>
          `;
          tableBody.appendChild(row);
        });

        // Edit listener
        document.querySelectorAll('.edit-btn').forEach(btn => {
          btn.addEventListener('click', () => {
            const id = btn.getAttribute('data-id');
            const s = subs.find(item => item.id === id);
            if (s) {
              document.getElementById('subdivision-id').value = s.id;
              parentSelect.value = s.divisionId;
              document.getElementById('sub-name-input').value = s.name;
              document.getElementById('sub-code-input').value = s.code;
              document.getElementById('sub-desc-input').value = s.description || '';
              document.getElementById('sub-order-input').value = s.order;
              document.getElementById('sub-ranking-input').checked = s.rankingEnabled !== false;
              document.getElementById('sub-champion-input').checked = s.championEnabled !== false;
              document.getElementById('sub-active-input').checked = s.active !== false;

              document.getElementById('form-header-sub').textContent = t.editHeader;
              cancelBtn.classList.remove('hidden');
            }
          });
        });

        // Delete listener
        document.querySelectorAll('.delete-btn').forEach(btn => {
          btn.addEventListener('click', async () => {
            const id = btn.getAttribute('data-id');
            if (confirm(t.confirmDelete)) {
              btn.disabled = true;
              btn.textContent = t.deleting;
              try {
                await deleteSubdivision(id);
                await renderSubdivisions();
              } catch (err) {
                alert("Error deleting subdivision: " + err.message);
              }
            }
          });
        });

      } catch (err) {
        tableBody.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-rose-500">Error loading subdivisions: ${err.message}</td></tr>`;
      }
    }

    function resetForm() {
      const t = trans[currentLang];
      document.getElementById('subdivision-id').value = "";
      form.reset();
      document.getElementById('form-header-sub').textContent = t.createHeader;
      cancelBtn.classList.add('hidden');
    }

    initSubdivisionsDashboard();
  </script>
</body>
</html>
