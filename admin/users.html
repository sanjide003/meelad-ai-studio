<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Manage Accounts - MeeladPulse</title>
  <link rel="stylesheet" href="/assets/css/main.css">
</head>
<body class="bg-slate-50 min-h-screen">
  
  <div id="global-page-loader" class="fixed inset-0 bg-white z-50 flex items-center justify-center">
    <div class="flex flex-col items-center space-y-3">
      <div class="h-10 w-10 border-4 border-slate-200 border-t-emerald-500 rounded-full animate-spin"></div>
      <p class="text-xs font-bold text-slate-700">Loading account lists...</p>
    </div>
  </div>

  <div class="min-h-screen flex flex-col lg:flex-row">
    
    <!-- Sidebar -->
    <div id="portal-sidebar"></div>

    <!-- Main Content -->
    <div class="flex-1 flex flex-col min-w-0 main-content-layout">
      
      <!-- Header -->
      <div id="portal-header"></div>

      <main class="flex-1 p-4 lg:p-8 space-y-8">
        
        <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs space-y-2">
          <h1 class="text-2xl font-extrabold text-slate-900 tracking-tight font-display">Manage User Accounts</h1>
          <p class="text-xs text-slate-400 font-medium">Verify system profiles, toggle activation codes, and restrict security clearances.</p>
        </div>

        <!-- Alert Notification Toast -->
        <div id="alert-toast" class="hidden bg-emerald-50 border border-emerald-100 text-emerald-800 rounded-xl p-4 text-xs flex items-center space-x-2">
          <svg class="h-4 w-4 text-emerald-500 shrink-0" fill="none" stroke="currentColor" viewBox="0 0 24 24"><path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M9 12l2 2 4-4m6 2a9 9 0 11-18 0 9 9 0 0118 0z"/></svg>
          <span id="alert-toast-text">Account updated successfully.</span>
        </div>

        <!-- Users Table Card -->
        <div class="bg-white rounded-2xl border border-slate-100 overflow-hidden shadow-xs">
          <div class="p-5 border-b border-slate-100 bg-slate-50/50">
            <h2 class="text-xs font-bold text-slate-500 uppercase tracking-wider">Registered System Profiles</h2>
          </div>

          <div class="table-container">
            <table class="w-full text-left border-collapse">
              <thead>
                <tr class="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50/20">
                  <th class="px-6 py-4">User Info</th>
                  <th class="px-6 py-4">Assigned Role</th>
                  <th class="px-6 py-4">Associated Team</th>
                  <th class="px-6 py-4">Account Status</th>
                  <th class="px-6 py-4 text-right">Actions</th>
                </tr>
              </thead>
              <tbody id="users-table-body" class="divide-y divide-slate-100 text-xs text-slate-700">
                <!-- Loaded Dynamically -->
                <tr>
                  <td colspan="5" class="px-6 py-12 text-center text-slate-400">Scanning security nodes...</td>
                </tr>
              </tbody>
            </table>
          </div>
        </div>

      </main>
    </div>
  </div>

  <script type="module">
    import { verifyUserRole } from "/assets/js/role-guard.js";
    import { loadPortalLayout } from "/assets/js/component-loader.js";
    import { initializeNavigation } from "/assets/js/navigation.js";
    import { db } from "/assets/js/firebase-init.js";
    import { collection, getDocs, doc, updateDoc } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    async function initUsersManager() {
      try {
        await verifyUserRole(['admin']);
        await loadPortalLayout('admin');
        initializeNavigation();

        await loadUsersList();
      } catch (err) {
        console.error("Failed loading user dashboard context:", err);
      }
    }

    async function loadUsersList() {
      const tableBody = document.getElementById('users-table-body');
      
      try {
        const usersCol = collection(db, 'users');
        const querySnapshot = await getDocs(usersCol);

        tableBody.innerHTML = '';

        if (querySnapshot.empty) {
          tableBody.innerHTML = `
            <tr>
              <td colspan="5" class="px-6 py-12 text-center text-slate-400 font-medium">No registered system profiles found.</td>
            </tr>
          `;
          return;
        }

        querySnapshot.forEach((userDoc) => {
          const user = userDoc.data();
          const uid = userDoc.id;

          const row = document.createElement('tr');
          row.className = "hover:bg-slate-50/50 transition";

          const roleDisplayNames = {
            admin: 'Administrator',
            judge: 'Panel Judge',
            teamLeader: 'Team Leader'
          };

          const roleBadgeColor = user.role === 'admin' ? 'bg-slate-900 text-white' : (user.role === 'judge' ? 'bg-amber-50 text-amber-700 border border-amber-150' : 'bg-sky-50 text-sky-700 border border-sky-150');

          const activeBadgeClass = user.active 
            ? "bg-emerald-50 text-emerald-700 border border-emerald-150" 
            : "bg-rose-50 text-rose-700 border border-rose-150";
          const activeStatusText = user.active ? "Active" : "Disabled";

          const toggleButtonText = user.active ? "Disable Account" : "Enable Account";
          const toggleButtonColorClass = user.active ? "text-rose-600 hover:bg-rose-50 border-rose-200" : "text-emerald-600 hover:bg-emerald-50 border-emerald-200";

          row.innerHTML = `
            <td class="px-6 py-4">
              <div class="font-bold text-slate-900">${user.name || 'User Profile'}</div>
              <div class="text-[10px] font-mono text-slate-400 mt-0.5">${user.email}</div>
            </td>
            <td class="px-6 py-4">
              <span class="inline-flex px-2 py-0.5 rounded-md text-[10px] font-bold uppercase tracking-wider ${roleBadgeColor}">
                ${roleDisplayNames[user.role] || user.role}
              </span>
            </td>
            <td class="px-6 py-4 font-mono font-semibold text-slate-500">
              ${user.teamId || '<span class="text-slate-300 font-normal">None</span>'}
            </td>
            <td class="px-6 py-4">
              <span class="inline-flex px-2 py-0.5 rounded-full text-[10px] font-bold uppercase tracking-wider ${activeBadgeClass}">
                ${activeStatusText}
              </span>
            </td>
            <td class="px-6 py-4 text-right">
              <button class="toggle-btn inline-flex items-center px-3 py-1.5 border rounded-lg text-[10px] font-bold transition cursor-pointer ${toggleButtonColorClass}" data-uid="${uid}" data-active="${user.active}">
                ${toggleButtonText}
              </button>
            </td>
          `;

          // Bind toggle status event
          const btn = row.querySelector('.toggle-btn');
          btn.addEventListener('click', async () => {
            const currentActive = btn.getAttribute('data-active') === 'true';
            await toggleUserActivation(uid, !currentActive);
          });

          tableBody.appendChild(row);
        });

      } catch (err) {
        console.error("Could not load users list:", err);
        tableBody.innerHTML = `
          <tr>
            <td colspan="5" class="px-6 py-12 text-center text-rose-600 font-bold">Failed to load system profiles. Query rejected.</td>
          </tr>
        `;
      }
    }

    async function toggleUserActivation(uid, newStatus) {
      const globalLoader = document.getElementById('global-page-loader');
      globalLoader.classList.remove('hidden');

      try {
        const userDocRef = doc(db, 'users', uid);
        await updateDoc(userDocRef, {
          active: newStatus,
          updatedAt: new Date()
        });

        // Trigger Toast Notification
        showToast(`User profile registration updated to: ${newStatus ? 'ACTIVE' : 'DISABLED'}`);
        
        // Refresh Table Roster
        await loadUsersList();
      } catch (err) {
        console.error("Could not update user activation:", err);
        alert(`Error modifying profile state: ${err.message}`);
      } finally {
        globalLoader.classList.add('hidden');
      }
    }

    function showToast(message) {
      const toast = document.getElementById('alert-toast');
      const text = document.getElementById('alert-toast-text');
      text.textContent = message;
      toast.classList.remove('hidden');
      
      setTimeout(() => {
        toast.classList.add('hidden');
      }, 4000);
    }

    // Run core boots
    initUsersManager();
  </script>
</body>
</html>
