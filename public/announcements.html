<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Official Announcements - Public Portal</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

  <header id="public-header" class="sticky top-0 z-40 bg-white/85 backdrop-blur-md border-b border-slate-100"></header>

  <main class="flex-grow max-w-4xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8">
    
    <!-- Title Card -->
    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div class="space-y-1">
        <h1 class="text-2xl font-extrabold text-slate-950 tracking-tight font-display" id="page-title">Festival Bulletin Desk</h1>
        <p class="text-xs text-slate-400 font-medium font-display" id="page-subtitle">Urgent schedule revisions, venue announcements, and official bulletins. Malayalam: അറിയിപ്പുകൾ</p>
      </div>
      <div class="flex items-center shrink-0">
        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[9px] font-extrabold bg-indigo-50 text-indigo-700 border border-indigo-100 space-x-1.5 font-mono">
          <span class="h-1.5 w-1.5 rounded-full bg-indigo-500 animate-ping"></span>
          <span>OFFICIAL BULLETINS</span>
        </span>
      </div>
    </div>

    <!-- Announcements Stack -->
    <div id="announcements-stack" class="space-y-6">
      <div class="text-center text-slate-400 py-12 font-medium">Scanning notices board...</div>
    </div>

  </main>

  <footer id="public-footer" class="bg-white border-t border-slate-100 py-8"></footer>

  <script type="module">
    import { getActiveFestivalId } from "/assets/js/public-config-service.js";
    import { subscribePublicAnnouncements } from "/assets/js/public-home-service.js";
    import { initializePublicNavigation } from "/assets/js/navigation.js";

    const festId = getActiveFestivalId();
    let unsubscribeAnnouncements = null;

    async function init() {
      await initializePublicNavigation();

      const lang = localStorage.getItem('meeladpulse_lang') || 'en';
      translatePage(lang);

      // Clean up previous subscription if any
      if (unsubscribeAnnouncements) {
        unsubscribeAnnouncements();
      }

      unsubscribeAnnouncements = subscribePublicAnnouncements(festId, (announcements) => {
        renderAnnouncements(announcements);
      });

      // Listen for window unload to clean up the real-time listener
      window.addEventListener('beforeunload', () => {
        if (unsubscribeAnnouncements) {
          unsubscribeAnnouncements();
        }
      });
    }

    function translatePage(lang) {
      if (lang === 'ml') {
        document.getElementById('page-title').textContent = "അറിയിപ്പുകൾ (Festival Bulletins)";
        document.getElementById('page-subtitle').textContent = "അടിയന്തര സമയക്രമ മാറ്റങ്ങൾ, മത്സര വിവരങ്ങൾ, കൂടാതെ ഔദ്യോഗിക പത്രക്കുറിപ്പുകൾ.";
      }
    }

    function renderAnnouncements(list) {
      const stack = document.getElementById('announcements-stack');
      stack.innerHTML = '';

      if (!list || list.length === 0) {
        stack.innerHTML = `<div class="bg-white rounded-2xl border border-slate-100 p-12 text-center text-slate-400 font-medium">No official announcements published yet.</div>`;
        return;
      }

      list.forEach(item => {
        const div = document.createElement('div');
        div.className = "bg-white rounded-2xl border border-slate-100 p-6 shadow-xs space-y-4 hover:shadow-xs transition duration-200";

        let dateStr = 'TBD';
        if (item.publishDate) {
          try {
            const dateObj = item.publishDate.seconds ? new Date(item.publishDate.seconds * 1000) : new Date(item.publishDate);
            dateStr = dateObj.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          } catch (e) {
            dateStr = item.publishDate;
          }
        } else if (item.timestamp) {
          try {
            const dateObj = item.timestamp.seconds ? new Date(item.timestamp.seconds * 1000) : new Date(item.timestamp);
            dateStr = dateObj.toLocaleString([], { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
          } catch (e) {
            dateStr = item.timestamp;
          }
        }

        const level = (item.priority || 'normal').toLowerCase();
        let pLabel = `<span class="px-2 py-0.5 rounded text-[8px] font-extrabold uppercase bg-slate-50 text-slate-500 border border-slate-150 font-mono">BULLETIN</span>`;
        if (level === 'high' || level === 'urgent') {
          pLabel = `<span class="px-2 py-0.5 rounded text-[8px] font-extrabold uppercase bg-rose-50 text-rose-700 border border-rose-100 font-mono animate-pulse">⚠️ URGENT BULLETIN</span>`;
        }

        div.innerHTML = `
          <div class="flex items-center justify-between">
            <div class="flex items-center space-x-2">
              ${pLabel}
            </div>
            <span class="text-[10px] font-mono text-slate-400 font-bold">${dateStr}</span>
          </div>
          <div class="space-y-1">
            <h3 class="text-sm font-extrabold text-slate-900 font-display">${item.title}</h3>
            <p class="text-xs text-slate-500 font-medium leading-relaxed">${item.content || item.message || ''}</p>
          </div>
        `;
        stack.appendChild(div);
      });
    }

    init();
  </script>
</body>
</html>
