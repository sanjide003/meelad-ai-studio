<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Team Results - Public Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

  <header id="public-header" class="sticky top-0 z-40 bg-white/85 backdrop-blur-md border-b border-slate-100"></header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8">
    
    <!-- Title Card -->
    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div class="space-y-1">
        <h1 class="text-2xl font-extrabold text-slate-950 tracking-tight font-display" id="page-title">Team Results</h1>
        <p class="text-xs text-slate-400 font-medium font-display" id="page-subtitle">Interactive search and grouping of official wins by specific team. Malayalam: ടീം ഫലങ്ങൾ</p>
      </div>
      <div class="flex items-center space-x-3 shrink-0">
        <label class="text-[10px] font-bold text-slate-400 uppercase tracking-widest font-mono shrink-0">Select Team:</label>
        <select id="team-selector" class="w-48 p-2.5 text-xs border border-slate-250 rounded-xl bg-white outline-none focus:ring-2 focus:ring-indigo-500 font-extrabold text-indigo-700 font-display">
          <option value="">Choose a Team</option>
        </select>
      </div>
    </div>

    <!-- Team Report Card Section -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-xs overflow-hidden">
      <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
        <h2 class="text-xs font-extrabold text-slate-400 uppercase tracking-widest font-display" id="table-heading">Team Performance Gazette</h2>
        <span id="selected-team-badge" class="px-2.5 py-1 text-[10px] font-extrabold bg-indigo-50 text-indigo-700 border border-indigo-100 rounded-full font-display uppercase tracking-wider">SELECT A TEAM</span>
      </div>
      <div class="table-container">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50/20">
              <th class="px-6 py-4 font-mono w-24">Code</th>
              <th class="px-6 py-4">Competition</th>
              <th class="px-6 py-4">Category</th>
              <th class="px-6 py-4">Winner Name</th>
              <th class="px-6 py-4 font-mono text-center">Grade</th>
              <th class="px-6 py-4 text-right">Position</th>
            </tr>
          </thead>
          <tbody id="team-results-table-body" class="divide-y divide-slate-100 text-xs font-semibold text-slate-700">
            <tr>
              <td colspan="6" class="px-6 py-12 text-center text-slate-400 font-medium font-display">Please select a team from the dropdown menu to analyze their published wins.</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <footer id="public-footer" class="bg-white border-t border-slate-100 py-8"></footer>

  <script type="module">
    import { getActiveFestivalId } from "../assets/js/public-config-service.js";
    import { subscribeLatestPublicResults } from "../assets/js/public-result-service.js";
    import { initializePublicNavigation } from "../assets/js/navigation.js";
    import { db } from "../assets/js/firebase-init.js";
    import { collection, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    const festId = getActiveFestivalId();
    let publishedResults = [];
    let teams = [];
    let selectedTeamName = '';

    async function init() {
      await initializePublicNavigation();

      const lang = localStorage.getItem('meeladpulse_lang') || 'en';
      translatePage(lang);

      await loadTeams();

      document.getElementById('team-selector').onchange = (e) => {
        selectedTeamName = e.target.value;
        document.getElementById('selected-team-badge').textContent = selectedTeamName ? selectedTeamName.toUpperCase() : "SELECT A TEAM";
        render();
      };

      subscribeLatestPublicResults(festId, 300, (results) => {
        publishedResults = results;
        render();
      });
    }

    function translatePage(lang) {
      if (lang === 'ml') {
        document.getElementById('page-title').textContent = "ടീം ഫലങ്ങൾ (Team Results)";
        document.getElementById('page-subtitle').textContent = "തിരഞ്ഞെടുത്ത ടീമിന്റെ സജീവ ഫലങ്ങളും വിജയികളും ഇവിടെ കാണാം.";
        document.getElementById('table-heading').textContent = "ടീം ഫലങ്ങൾ";
      }
    }

    async function loadTeams() {
      const select = document.getElementById('team-selector');
      try {
        const snap = await getDocs(collection(db, `festivals/${festId}/teams`));
        teams = snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
        
        teams.sort((a, b) => a.name.localeCompare(b.name));
        
        teams.forEach(t => {
          const opt = document.createElement('option');
          opt.value = t.name;
          opt.textContent = `${t.name} (${t.code || t.id})`;
          select.appendChild(opt);
        });
      } catch (e) {
        console.error("Failed to load teams reference list:", e);
      }
    }

    function render() {
      const body = document.getElementById('team-results-table-body');
      body.innerHTML = '';

      if (!selectedTeamName) {
        body.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400">Please select a team from the dropdown menu to analyze their published wins.</td></tr>`;
        return;
      }

      const teamWins = [];

      publishedResults.forEach(r => {
        const winners = r.winners || [];
        winners.forEach(w => {
          if (w.teamName === selectedTeamName) {
            teamWins.push({
              competitionCode: r.competitionCode || r.competitionId,
              competitionName: r.competitionName,
              categoryName: r.categoryName || 'General',
              displayName: w.displayName,
              chestNumber: w.chestNumber || w.publicParticipantCode || '--',
              grade: w.grade || 'None',
              position: w.position || 'Podium'
            });
          }
        });
      });

      if (teamWins.length === 0) {
        body.innerHTML = `<tr><td colspan="6" class="px-6 py-12 text-center text-slate-400 italic">No published wins recorded for this team yet.</td></tr>`;
        return;
      }

      // Sort by competition code
      teamWins.sort((a, b) => a.competitionCode.localeCompare(b.competitionCode));

      teamWins.forEach(win => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50/50 transition border-b border-slate-100";

        tr.innerHTML = `
          <td class="px-6 py-4 font-mono font-bold text-slate-500">${win.competitionCode}</td>
          <td class="px-6 py-4 font-extrabold text-slate-950 font-display">${win.competitionName}</td>
          <td class="px-6 py-4 text-slate-400 font-bold uppercase tracking-wider text-[10px] font-display">${win.categoryName}</td>
          <td class="px-6 py-4">
            <div class="font-extrabold text-slate-900">${win.displayName}</div>
            <div class="text-[9px] text-slate-400 font-mono font-bold uppercase tracking-widest mt-0.5">Chest: ${win.chestNumber}</div>
          </td>
          <td class="px-6 py-4 text-center">
            ${win.grade && win.grade !== 'None' ? `<span class="px-2 py-0.5 bg-emerald-50 text-emerald-700 text-[10px] font-extrabold rounded-lg border border-emerald-100">${win.grade}</span>` : '<span class="text-slate-300">--</span>'}
          </td>
          <td class="px-6 py-4 text-right">
            <span class="inline-flex px-2 py-0.5 rounded-full text-[9px] font-extrabold bg-indigo-50 text-indigo-700 border border-indigo-100 uppercase tracking-wider font-display">${win.position}</span>
          </td>
        `;
        body.appendChild(tr);
      });
    }

    init();
  </script>
</body>
</html>
