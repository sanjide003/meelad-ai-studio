<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Overall Standings - Public Portal</title>
  <script src="https://cdn.tailwindcss.com"></script>
  <link rel="stylesheet" href="../assets/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

  <!-- Public Dynamic Header Component -->
  <header id="public-header" class="sticky top-0 z-40 bg-white/85 backdrop-blur-md border-b border-slate-100"></header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8">
    
    <!-- Title Card -->
    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div class="space-y-1">
        <h1 class="text-2xl font-extrabold text-slate-950 tracking-tight font-display" id="page-title">Overall Team Standings</h1>
        <p class="text-xs text-slate-400 font-medium font-display" id="page-subtitle">Real-time team standings and medal tallies across all events.</p>
      </div>
      <div class="flex items-center shrink-0">
        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[9px] font-extrabold bg-indigo-50 text-indigo-700 border border-indigo-100 space-x-1.5 font-mono">
          <span class="h-1.5 w-1.5 rounded-full bg-indigo-500 animate-ping"></span>
          <span>SECURE PUBLIC FEED</span>
        </span>
      </div>
    </div>

    <!-- Standings Log Card -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-xs overflow-hidden">
      <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex items-center justify-between">
        <h2 class="text-xs font-extrabold text-slate-400 uppercase tracking-widest font-display" id="table-heading">Team Leaderboard</h2>
        <input type="text" id="ranking-search" class="w-48 sm:w-64 p-2 text-xs border border-slate-200 rounded-xl outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Search team code or name...">
      </div>
      <div class="table-container">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50/20">
              <th class="px-6 py-4 w-16">Rank</th>
              <th class="px-6 py-4">Team</th>
              <th class="px-6 py-4 font-mono text-center">Arts Pts</th>
              <th class="px-6 py-4 font-mono text-center">Sports Pts</th>
              <th class="px-6 py-4 font-mono text-center">Bonus Pts</th>
              <th class="px-6 py-4 font-mono text-center">Penalty Pts</th>
              <th class="px-6 py-4 text-center">Medals (1st / 2nd / 3rd)</th>
              <th class="px-6 py-4 font-mono text-right">Overall Total</th>
            </tr>
          </thead>
          <tbody id="standings-table-body" class="divide-y divide-slate-100 text-xs font-semibold text-slate-700">
            <tr>
              <td colspan="8" class="px-6 py-12 text-center text-slate-400 font-medium font-display">Awaiting standings data stream...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <!-- Public Dynamic Footer Component -->
  <footer id="public-footer" class="bg-white border-t border-slate-100 py-8"></footer>

  <script type="module">
    import { getActiveFestivalId } from "../assets/js/public-config-service.js";
    import { getPublicRankingsOneTime } from "../assets/js/public-result-service.js";
    import { initializePublicNavigation } from "../assets/js/navigation.js";

    const festId = getActiveFestivalId();
    let currentRankings = [];

    async function init() {
      await initializePublicNavigation();
      
      const lang = localStorage.getItem('meeladpulse_lang') || 'en';
      translatePage(lang);

      // Search element listener
      document.getElementById('ranking-search').oninput = (e) => {
        render(e.target.value);
      };

      try {
        currentRankings = await getPublicRankingsOneTime(festId);
        render();
      } catch (err) {
        console.error("Error loading overall team rankings:", err);
      }
    }

    function translatePage(lang) {
      if (lang === 'ml') {
        document.getElementById('page-title').textContent = "ടീം റാങ്കിംഗ്";
        document.getElementById('page-subtitle').textContent = "എല്ലാ വിഭാഗങ്ങളിലെയും സജീവ ടീമുകളുടെ നിലവിലെ റാങ്കിംഗും പോയിന്റുകളും.";
        document.getElementById('table-heading').textContent = "ലീഡർബോർഡ്";
        document.getElementById('ranking-search').placeholder = "ടീം തിരയുക...";
      }
    }

    function render(searchQuery = '') {
      const body = document.getElementById('standings-table-body');
      body.innerHTML = '';

      let filtered = currentRankings;
      if (searchQuery.trim() !== '') {
        const q = searchQuery.toLowerCase().trim();
        filtered = currentRankings.filter(r => 
          (r.teamName || '').toLowerCase().includes(q) || 
          (r.teamCode || '').toLowerCase().includes(q)
        );
      }

      if (filtered.length === 0) {
        body.innerHTML = `<tr><td colspan="8" class="px-6 py-12 text-center text-slate-400">No standings calculated yet.</td></tr>`;
        return;
      }

      filtered.forEach((row, i) => {
        // Render rows
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50/50 transition border-b border-slate-100";
        
        let rankBadge = `<span class="font-bold text-slate-400 font-mono">#${row.rank || (i + 1)}</span>`;
        if (i === 0) {
          rankBadge = `<span class="inline-flex items-center justify-center h-6 w-6 rounded-full bg-amber-50 text-amber-700 text-[10px] border border-amber-200 font-extrabold font-mono">🏆 1</span>`;
        } else if (i === 1) {
          rankBadge = `<span class="inline-flex items-center justify-center h-6 w-6 rounded-full bg-slate-100 text-slate-700 text-[10px] border border-slate-200 font-extrabold font-mono">🥈 2</span>`;
        } else if (i === 2) {
          rankBadge = `<span class="inline-flex items-center justify-center h-6 w-6 rounded-full bg-amber-500/10 text-amber-900 text-[10px] border border-amber-900/10 font-extrabold font-mono">🥉 3</span>`;
        }

        tr.innerHTML = `
          <td class="px-6 py-4">${rankBadge}</td>
          <td class="px-6 py-4">
            <div class="flex items-center space-x-2">
              <span class="h-2.5 w-2.5 rounded-full" style="background-color: ${row.teamColour || '#10b981'}"></span>
              <span class="font-extrabold text-slate-900">${row.teamName} (${row.teamCode || row.teamId})</span>
            </div>
          </td>
          <td class="px-6 py-4 text-center font-mono font-bold text-slate-500">${row.artsTotal || 0}</td>
          <td class="px-6 py-4 text-center font-mono font-bold text-slate-500">${row.sportsTotal || 0}</td>
          <td class="px-6 py-4 text-center font-mono font-bold text-emerald-600">+${row.bonusTotal || 0}</td>
          <td class="px-6 py-4 text-center font-mono font-bold text-rose-600">-${row.penaltyTotal || 0}</td>
          <td class="px-6 py-4 text-center font-mono text-slate-400">
            <span class="font-bold text-slate-800">${row.firstCount || 0}</span> / 
            <span class="font-bold text-slate-800">${row.secondCount || 0}</span> / 
            <span class="font-bold text-slate-800">${row.thirdCount || 0}</span>
          </td>
          <td class="px-6 py-4 text-right font-extrabold text-indigo-700 font-mono text-sm">${row.overallTotal || 0}</td>
        `;
        body.appendChild(tr);
      });
    }

    init();
  </script>
</body>
</html>
