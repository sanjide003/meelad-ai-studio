<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Registration Status</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/css/main.css"></head><body class="bg-slate-50 min-h-screen"><main class="max-w-xl mx-auto p-6 space-y-4"><section class="admin-section-card setup-hero"><h1 class="text-2xl font-extrabold text-slate-950">Registration Status</h1><p class="text-sm text-slate-600 mt-1">Enter phone number to check approval status and rejection reason.</p></section><section class="admin-section-card space-y-3"><input id="phone" class="form-input" placeholder="Phone number"><button id="search" class="btn btn-primary text-white text-xs font-bold px-4 py-2">Search</button><div id="result" class="text-sm space-y-2"></div></section></main><script type="module">import { getPublicStudentRegistrationsByPhone } from '../assets/js/student-service.js';const params=new URLSearchParams(location.search);const institutionId=params.get('institution');const festivalId=params.get('festival')||institutionId;document.getElementById('search').onclick=async()=>{const phone=document.getElementById('phone').value.trim();const result=document.getElementById('result');if(!phone||!institutionId||!festivalId){result.textContent='Phone number and festival link are required.';return;}const rows=await getPublicStudentRegistrationsByPhone(phone,{institutionId,festivalId});result.innerHTML=rows.length?rows.map(s=>`<div class="admin-info-card p-3 mb-2"><strong>${s.name}</strong><br>Status: ${s.status==='active'?'approved':s.status||'pending'}${s.rejectionReason?`<br>Reason: ${s.rejectionReason}`:''}</div>`).join(''):'No registration found.';};</script></body></html>
