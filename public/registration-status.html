<!DOCTYPE html><html lang="en"><head><meta charset="UTF-8"><meta name="viewport" content="width=device-width, initial-scale=1.0"><title>Registration Status</title><script src="https://cdn.tailwindcss.com"></script><link rel="stylesheet" href="../assets/css/main.css"></head><body class="bg-slate-50 min-h-screen"><main class="max-w-xl mx-auto p-6 space-y-4"><section class="admin-section-card setup-hero"><h1 class="text-2xl font-extrabold text-slate-950">Registration Status</h1><p class="text-sm text-slate-600 mt-1">Enter phone number to check approval status and rejection reason.</p></section><section class="admin-section-card space-y-3"><input id="phone" class="form-input" placeholder="Phone number"><button id="search" class="btn btn-primary text-white text-xs font-bold px-4 py-2">Search</button><div id="result" class="text-sm"></div></section></main><script type="module">import { db } from '../assets/js/firebase-init.js';import { collection,getDocs,query,where } from 'https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js';const params=new URLSearchParams(location.search);const institution=params.get('institution');const festival=params.get('festival')||institution;document.getElementById('search').onclick=async()=>{const phone=document.getElementById('phone').value.trim();const result=document.getElementById('result');if(!phone||!institution||!festival){result.textContent='Phone number and festival link are required.';return;}const path=`institutions/${institution}/festivals/${festival}/festStudents`;const snap=await getDocs(query(collection(db,path),where('phone','==',phone)));result.innerHTML=snap.empty?'No registration found.':snap.docs.map(doc=>{const s=doc.data();return `<div class="admin-info-card p-3 mb-2"><strong>${s.name}</strong><br>Status: ${s.status||'active'}${s.rejectionReason?`<br>Reason: ${s.rejectionReason}`:''}</div>`}).join('');};</script></body></html>
