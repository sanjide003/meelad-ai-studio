<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Festival Schedule - Public Portal</title>
  <link rel="stylesheet" href="/assets/css/main.css">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=Space+Grotesk:wght@500;700&family=JetBrains+Mono:wght@400;500&display=swap" rel="stylesheet">
  <style>
    body {
      font-family: 'Inter', sans-serif;
    }
    .font-display {
      font-family: 'Space Grotesk', sans-serif;
    }
    .font-mono {
      font-family: 'JetBrains Mono', monospace;
    }
  </style>
</head>
<body class="bg-slate-50 min-h-screen flex flex-col">

  <header id="public-header" class="sticky top-0 z-40 bg-white/85 backdrop-blur-md border-b border-slate-100"></header>

  <main class="flex-grow max-w-7xl mx-auto px-4 sm:px-6 lg:px-8 py-8 w-full space-y-8">
    
    <!-- Title Card -->
    <div class="bg-white rounded-2xl border border-slate-100 p-6 shadow-xs flex flex-col sm:flex-row sm:items-center justify-between gap-4">
      <div class="space-y-1">
        <h1 class="text-2xl font-extrabold text-slate-950 tracking-tight font-display" id="page-title">Festival Schedule & Timeline</h1>
        <p class="text-xs text-slate-400 font-medium font-display" id="page-subtitle">Real-time venue schedules, timelines, and ongoing competition states. Malayalam: സമയക്രമം</p>
      </div>
      <div class="flex items-center shrink-0">
        <span class="inline-flex items-center px-2.5 py-1 rounded-full text-[9px] font-extrabold bg-indigo-50 text-indigo-700 border border-indigo-100 space-x-1.5 font-mono">
          <span class="h-1.5 w-1.5 rounded-full bg-emerald-500 animate-ping"></span>
          <span>LIVE EVENTS STREAM</span>
        </span>
      </div>
    </div>

    <!-- Schedule List Card -->
    <div class="bg-white rounded-2xl border border-slate-100 shadow-xs overflow-hidden">
      <div class="p-6 border-b border-slate-100 bg-slate-50/50 flex flex-wrap items-center justify-between gap-4">
        <h2 class="text-xs font-extrabold text-slate-400 uppercase tracking-widest font-display" id="table-heading">Timeline and Venue Schedules</h2>
        <input type="text" id="schedule-search" class="w-48 sm:w-64 p-2 text-xs border border-slate-200 rounded-xl outline-none focus:ring-1 focus:ring-indigo-500" placeholder="Search event or venue...">
      </div>
      <div class="table-container">
        <table class="w-full text-left border-collapse">
          <thead>
            <tr class="border-b border-slate-100 text-[10px] font-bold text-slate-400 uppercase tracking-widest bg-slate-50/20">
              <th class="px-6 py-4 w-32">Time</th>
              <th class="px-6 py-4">Venue / Stage</th>
              <th class="px-6 py-4">Event Code / Competition</th>
              <th class="px-6 py-4">Category</th>
              <th class="px-6 py-4 text-right">Status</th>
            </tr>
          </thead>
          <tbody id="schedule-table-body" class="divide-y divide-slate-100 text-xs font-semibold text-slate-700">
            <tr>
              <td colspan="5" class="px-6 py-12 text-center text-slate-400 font-medium font-display">Awaiting schedule data stream...</td>
            </tr>
          </tbody>
        </table>
      </div>
    </div>

  </main>

  <footer id="public-footer" class="bg-white border-t border-slate-100 py-8"></footer>

  <script type="module">
    import { getActiveFestivalId } from "/assets/js/public-config-service.js";
    import { getPublicScheduleOneTime } from "/assets/js/public-home-service.js";
    import { initializePublicNavigation } from "/assets/js/navigation.js";

    const festId = getActiveFestivalId();
    let currentSchedules = [];

    async function init() {
      await initializePublicNavigation();

      const lang = localStorage.getItem('meeladpulse_lang') || 'en';
      translatePage(lang);

      document.getElementById('schedule-search').oninput = (e) => {
        render(e.target.value);
      };

      try {
        currentSchedules = await getPublicScheduleOneTime(festId);
        render();
      } catch (err) {
        console.error("Error loading schedules list:", err);
      }
    }

    function translatePage(lang) {
      if (lang === 'ml') {
        document.getElementById('page-title').textContent = "സമയക്രമം (Festival Schedule)";
        document.getElementById('page-subtitle').textContent = "വിവിധ സ്റ്റേജുകളിലെ മത്സര സമയക്രമങ്ങളും തത്സമയ വിവരങ്ങളും ഇവിടെ കാണാം.";
        document.getElementById('table-heading').textContent = "മത്സരങ്ങൾ";
        document.getElementById('schedule-search').placeholder = "തിരയുക...";
      }
    }

    function render(searchQuery = '') {
      const body = document.getElementById('schedule-table-body');
      body.innerHTML = '';

      let filtered = currentSchedules;
      if (searchQuery.trim() !== '') {
        const q = searchQuery.toLowerCase().trim();
        filtered = currentSchedules.filter(s => 
          (s.competitionName || '').toLowerCase().includes(q) || 
          (s.competitionCode || '').toLowerCase().includes(q) ||
          (s.stageName || '').toLowerCase().includes(q)
        );
      }

      if (filtered.length === 0) {
        body.innerHTML = `<tr><td colspan="5" class="px-6 py-12 text-center text-slate-400">No scheduled items match your search.</td></tr>`;
        return;
      }

      filtered.forEach(s => {
        const tr = document.createElement('tr');
        tr.className = "hover:bg-slate-50/50 transition border-b border-slate-100";

        // Format Scheduled Time
        let timeStr = 'TBD';
        if (s.scheduledTime) {
          try {
            const dateObj = s.scheduledTime.seconds ? new Date(s.scheduledTime.seconds * 1000) : new Date(s.scheduledTime);
            timeStr = dateObj.toLocaleTimeString([], { hour: '2-digit', minute: '2-digit' }) + ' (' + dateObj.toLocaleDateString([], { month: 'short', day: 'numeric' }) + ')';
          } catch (e) {
            timeStr = s.scheduledTime;
          }
        }

        // Format status badge
        const stat = (s.status || 'scheduled').toLowerCase();
        let statBadge = `<span class="inline-flex px-2 py-0.5 rounded-full text-[9px] font-extrabold bg-slate-100 text-slate-500 uppercase tracking-wider">Scheduled</span>`;
        if (stat === 'ongoing' || stat === 'active') {
          statBadge = `<span class="inline-flex px-2 py-0.5 rounded-full text-[9px] font-extrabold bg-emerald-50 text-emerald-700 border border-emerald-100 uppercase tracking-wider animate-pulse">● Ongoing</span>`;
        } else if (stat === 'completed' || stat === 'published') {
          statBadge = `<span class="inline-flex px-2 py-0.5 rounded-full text-[9px] font-extrabold bg-indigo-50 text-indigo-700 border border-indigo-100 uppercase tracking-wider">✓ Completed</span>`;
        }

        tr.innerHTML = `
          <td class="px-6 py-4 font-mono font-bold text-slate-500">${timeStr}</td>
          <td class="px-6 py-4">
            <span class="inline-flex px-2 py-1 bg-slate-100 text-[10px] font-extrabold text-slate-700 rounded-lg border border-slate-200/50 uppercase tracking-wider font-display">${s.stageName || 'Main Stage'}</span>
          </td>
          <td class="px-6 py-4">
            <div class="font-extrabold text-slate-900 font-display">${s.competitionName}</div>
            <div class="text-[9px] text-indigo-600 font-mono font-bold uppercase tracking-widest mt-0.5">CODE: ${s.competitionCode || s.id}</div>
          </td>
          <td class="px-6 py-4 text-slate-500 uppercase tracking-wider font-display font-bold text-[10px]">${s.categoryName || 'General'}</td>
          <td class="px-6 py-4 text-right">${statBadge}</td>
        `;
        body.appendChild(tr);
      });
    }

    init();
  </script>
</body>
</html>
